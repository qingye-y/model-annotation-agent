<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商品审核大模型质检标注工作台</title>
  <link rel="stylesheet" href="/static/common.css">
  <style>
    /* ========== 主框架布局 ========== */
    .app {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ---------- 侧边栏 ---------- */
    .sidebar {
      width: var(--sidebar-width);
      background: var(--sidebar-bg);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      color: #a0a3bd;
      transition: width 0.3s ease;
      position: relative;
    }

    .sidebar.collapsed {
      width: 60px;
    }

    .sidebar-logo {
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      flex-shrink: 0;
    }

    .sidebar-logo-text {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.5px;
      white-space: nowrap;
      overflow: hidden;
      transition: opacity 0.3s ease, width 0.3s ease;
    }

    .sidebar.collapsed .sidebar-logo-text {
      opacity: 0;
      width: 0;
    }

    /* 收起/展开按钮 */
    .sidebar-toggle {
      background: rgba(255, 255, 255, 0.1);
      border: none;
      color: #a0a3bd;
      width: 28px;
      height: 28px;
      border-radius: var(--radius);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .sidebar-toggle:hover {
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
    }

    .sidebar.collapsed .sidebar-toggle {
      position: absolute;
      right: 16px;
      top: 14px;
    }

    .sidebar-menu {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 8px 0;
    }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 20px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      border-left: 3px solid transparent;
      white-space: nowrap;
      user-select: none;
      position: relative;
    }

    .menu-item:hover {
      background: var(--sidebar-hover);
      color: #fff;
    }

    .menu-item.active {
      background: rgba(79, 110, 247, 0.12);
      color: #fff;
      border-left-color: var(--primary);
    }

    .menu-icon {
      font-size: 16px;
      width: 20px;
      text-align: center;
      flex-shrink: 0;
    }

    .menu-label {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: opacity 0.3s ease;
    }

    .sidebar.collapsed .menu-label {
      opacity: 0;
      width: 0;
    }

    /* 收起状态下的 tooltip */
    .menu-item::after {
      content: attr(data-label);
      position: absolute;
      left: 60px;
      background: #1e1e2f;
      color: #fff;
      padding: 6px 12px;
      border-radius: var(--radius);
      font-size: 13px;
      white-space: nowrap;
      opacity: 0;
      visibility: hidden;
      transition: all 0.2s;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    .sidebar.collapsed .menu-item:hover::after {
      opacity: 1;
      visibility: visible;
      left: 70px;
    }

    /* 标注任务特殊高亮 */
    .menu-item.highlight {
      font-weight: 600;
      color: #ffd700;
    }

    .menu-item.highlight:hover {
      color: #ffe44d;
    }

    .menu-item.highlight.active {
      background: rgba(255, 215, 0, 0.12);
      border-left-color: #ffd700;
      color: #ffe44d;
    }

    /* ---------- 可折叠父菜单 ---------- */
    .menu-group {
      position: relative;
    }

    .menu-parent {
      justify-content: flex-start;
    }

    .menu-parent .menu-arrow {
      font-size: 10px;
      color: #6c6e85;
      transition: transform 0.25s ease;
      margin-left: auto;
      flex-shrink: 0;
      width: 16px;
      text-align: center;
    }

    .menu-parent.active .menu-arrow {
      color: #fff;
    }

    .menu-parent.expanded .menu-arrow {
      transform: rotate(90deg);
    }

    .menu-children {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
      background: rgba(0, 0, 0, 0.12);
    }

    .menu-children.expanded {
      max-height: 300px;
    }

    .menu-child {
      padding-left: 50px;
      font-size: 12px;
      color: #8b8ea3;
    }

    .menu-child:hover {
      color: #fff;
    }

    .menu-child.active {
      background: rgba(79, 110, 247, 0.08);
      color: #fff;
      border-left-color: var(--primary);
    }

    /* 收起状态下隐藏子菜单 */
    .sidebar.collapsed .menu-children {
      display: none !important;
    }

    .sidebar.collapsed .menu-parent.expanded .menu-arrow {
      transform: none;
    }

    .sidebar-footer {
      padding: 12px 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      font-size: 11px;
      color: #6c6e85;
      text-align: center;
      flex-shrink: 0;
      white-space: nowrap;
      overflow: hidden;
      transition: opacity 0.3s ease;
    }

    .sidebar.collapsed .sidebar-footer {
      opacity: 0;
      padding: 12px 0;
    }

    /* ---------- 右侧主体 ---------- */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }

    /* ---------- 顶部栏 ---------- */
    .header {
      height: var(--header-height);
      background: var(--white);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .header-breadcrumb-sep {
      color: var(--text-muted);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .header-user {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-primary);
      cursor: pointer;
      padding: 4px 8px;
      border-radius: var(--radius);
      transition: background 0.2s;
    }

    .header-user:hover {
      background: var(--border-light);
    }

    .header-user-name {
      font-weight: 500;
    }

    .header-user-arrow {
      font-size: 10px;
      color: var(--text-muted);
    }

    .header-logout {
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 4px 8px;
      border-radius: var(--radius);
      transition: all 0.2s;
    }

    .header-logout:hover {
      color: var(--danger);
      background: var(--danger-light);
    }

    /* ---------- 内容iframe ---------- */
    .content-frame {
      flex: 1;
      width: 100%;
      border: none;
      display: block;
      background: var(--bg);
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- 左侧侧边栏 -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <span class="sidebar-logo-text">大模型审核数据工作台</span>
        <button class="sidebar-toggle" id="sidebarToggle" title="收起/展开侧边栏">☰</button>
      </div>
      <nav class="sidebar-menu" id="sidebarMenu">
        <div class="menu-item active" data-page="dashboard.html" data-label="数据看板">
          <span class="menu-icon">&#128202;</span>
          <span class="menu-label">数据看板</span>
        </div>
        <div class="menu-item" data-page="model_task.html" data-label="机审任务中心">
          <span class="menu-icon">&#9881;&#65039;</span>
          <span class="menu-label">机审任务中心</span>
        </div>
        <div class="menu-item" data-page="dispatch_center.html" data-label="任务调度">
          <span class="menu-icon">&#128203;</span>
          <span class="menu-label">任务调度</span>
        </div>
        <div class="menu-item highlight" data-page="annotation_list.html" data-label="标注任务">
          <span class="menu-icon">&#9999;&#65039;</span>
          <span class="menu-label">标注任务</span>
        </div>
        <div class="menu-item" data-page="qc_center.html" data-label="质检中心">
          <span class="menu-icon">&#9989;</span>
          <span class="menu-label">质检中心</span>
        </div>
        <div class="menu-item" data-page="badcase_center.html" data-label="Badcase管理">
          <span class="menu-icon">&#128269;</span>
          <span class="menu-label">Badcase管理</span>
        </div>

        <!-- 智能分析中心 - 独立菜单项 -->
        <div class="menu-item" data-page="analysis_center.html" data-label="智能分析中心">
          <span class="menu-icon">&#128161;</span>
          <span class="menu-label">智能分析中心</span>
        </div>

        <!-- 系统配置父菜单 -->
        <div class="menu-group">
          <div class="menu-item menu-parent" data-toggle="sysconfig" data-label="系统配置">
            <span class="menu-icon">&#9881;</span>
            <span class="menu-label">系统配置</span>
            <span class="menu-arrow">&#9656;</span>
          </div>
          <div class="menu-children" id="sysconfig-children">
            <div class="menu-item menu-child" data-page="sql_config.html" data-label="数据源配置" data-parent="sysconfig">
              <span class="menu-icon">&#128295;</span>
              <span class="menu-label">数据源配置</span>
            </div>
            <div class="menu-item menu-child" data-page="rule_config.html" data-label="审核规则与实例" data-parent="sysconfig">
              <span class="menu-icon">&#128203;</span>
              <span class="menu-label">审核规则与实例</span>
            </div>
            <div class="menu-item menu-child" data-page="modelb_config.html" data-label="模型B配置" data-parent="sysconfig">
              <span class="menu-icon">&#129302;</span>
              <span class="menu-label">模型B配置</span>
            </div>
            <div class="menu-item menu-child" data-page="label_config.html" data-label="标注标签配置" data-parent="sysconfig">
              <span class="menu-icon">&#127991;</span>
              <span class="menu-label">标注标签配置</span>
            </div>
            <div class="menu-item menu-child" data-page="account_management.html" data-label="账号管理" data-parent="sysconfig">
              <span class="menu-icon">&#128101;</span>
              <span class="menu-label">账号管理</span>
            </div>
          </div>
        </div>
      </nav>
      <div class="sidebar-footer">
        v1.0.0 &middot; 商品审核质检平台
      </div>
    </aside>

    <!-- 右侧主体 -->
    <div class="main">
      <!-- 顶部栏 -->
      <header class="header">
        <div class="header-left">
          <span id="breadcrumbCurrent">数据看板</span>
        </div>
        <div class="header-right">
          <div class="header-user">
            <span>&#128100;</span>
            <span class="header-user-name">管理员，你好</span>
            <span class="header-user-arrow">&#9662;</span>
          </div>
          <div class="header-logout" onclick="handleLogout()">
            <span>&#128682;</span> 退出
          </div>
        </div>
      </header>

      <!-- iframe 内容区 -->
      <iframe class="content-frame" id="contentFrame" src="dashboard.html" name="contentFrame"></iframe>
    </div>
  </div>

  <script>
    (function() {
      const menuItems = document.querySelectorAll('.menu-item');
      const contentFrame = document.getElementById('contentFrame');
      const breadcrumbCurrent = document.getElementById('breadcrumbCurrent');
      const sidebar = document.getElementById('sidebar');
      const sidebarToggle = document.getElementById('sidebarToggle');

      // 恢复侧边栏状态
      const savedState = localStorage.getItem('sidebarCollapsed');
      if (savedState === 'true') {
        sidebar.classList.add('collapsed');
        sidebarToggle.textContent = '»';
      }

      // 侧边栏收起/展开
      sidebarToggle.addEventListener('click', function() {
        sidebar.classList.toggle('collapsed');
        const isCollapsed = sidebar.classList.contains('collapsed');
        sidebarToggle.textContent = isCollapsed ? '»' : '☰';
        localStorage.setItem('sidebarCollapsed', isCollapsed);
      });

      // 展开父菜单
      function expandParent(parentId) {
        const parentEl = document.querySelector('.menu-parent[data-toggle="' + parentId + '"]');
        const childrenEl = document.getElementById(parentId + '-children');
        if (parentEl && childrenEl) {
          parentEl.classList.add('expanded');
          childrenEl.classList.add('expanded');
        }
      }

      // 折叠父菜单
      function collapseParent(parentId) {
        const parentEl = document.querySelector('.menu-parent[data-toggle="' + parentId + '"]');
        const childrenEl = document.getElementById(parentId + '-children');
        if (parentEl && childrenEl) {
          parentEl.classList.remove('expanded');
          childrenEl.classList.remove('expanded');
        }
      }

      // 设置激活状态
      function setActiveMenu(targetItem) {
        menuItems.forEach(function(m) { m.classList.remove('active'); });
        targetItem.classList.add('active');

        // 如果点击的是子菜单，展开父菜单
        const parentId = targetItem.dataset.parent;
        if (parentId) {
          expandParent(parentId);
        }
      }

      // 暴露给 iframe 调用的导航函数（v3.0：iframe 跳转时同步更新侧边栏激活状态）
      window.navigateTo = function(page) {
        contentFrame.src = page;
        // 去掉查询参数后匹配菜单项（如 annotation_list.html?dispatch_batch_no=xxx → annotation_list.html）
        var pageBase = page.split('?')[0];
        var menuItem = document.querySelector('.menu-item[data-page="' + pageBase + '"]');
        if (menuItem) {
          setActiveMenu(menuItem);
          breadcrumbCurrent.textContent = menuItem.querySelector('.menu-label').textContent;
        } else if (pageBase === 'annotation_detail.html' || page.startsWith('annotation_detail')) {
          // 详情页：在侧栏高亮"标注任务"菜单，顶部显示二级标题
          var annotMenu = document.querySelector('.menu-item[data-page="annotation_list.html"]');
          if (annotMenu) { setActiveMenu(annotMenu); }
          breadcrumbCurrent.textContent = '标注任务 > 商品标注';
        }
      };

      // iframe 内页面控制侧边栏显隐
      window.hideSidebar = function() {
        sidebar.classList.add('collapsed');
        sidebarToggle.textContent = '»';
      };
      window.showSidebar = function() {
        sidebar.classList.remove('collapsed');
        sidebarToggle.textContent = '☰';
      };

      // 菜单项点击切换
      menuItems.forEach(function(item) {
        item.addEventListener('click', function() {
          const page = this.dataset.page;
          const label = this.querySelector('.menu-label').textContent;
          const isParent = this.classList.contains('menu-parent');
          const toggleId = this.dataset.toggle;

          // 父菜单点击：展开/收起
          if (isParent && toggleId) {
            const childrenEl = document.getElementById(toggleId + '-children');
            const isExpanded = this.classList.contains('expanded');
            if (isExpanded) {
              collapseParent(toggleId);
            } else {
              expandParent(toggleId);
            }
            // 父菜单自身不设 active，不切换 iframe
            return;
          }

          if (!page) return;

          // 更新激活状态
          setActiveMenu(this);

          // 切换 iframe
          contentFrame.src = page;

          // 更新面包屑
          breadcrumbCurrent.textContent = label;
        });
      });

      // 退出登录
      window.handleLogout = function() {
        if (confirm('确定要退出登录吗？')) {
          alert('已退出登录（演示模式）');
          // 实际项目中这里会清除token并跳转登录页
        }
      };
    })();
  </script>
</body>
</html>
