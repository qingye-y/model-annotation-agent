<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>模型B配置</title>
  <link rel="stylesheet" href="/static/common.css">
  <style>
    .page-container {
      padding: 20px 24px;
      max-width: 900px;
    }

    .page-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .page-subtitle {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 20px;
    }

    .config-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 20px;
      margin-bottom: 20px;
    }

    .config-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-light);
    }

    .config-card-title {
      font-size: 15px;
      font-weight: 600;
    }

    .config-desc {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 16px;
      line-height: 1.6;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: var(--radius);
      font-size: 12px;
      font-weight: 500;
    }

    .status-badge.success {
      background: var(--success-light);
      color: var(--success);
    }

    .status-badge.warning {
      background: var(--warning-light);
      color: var(--warning);
    }

    .status-badge.info {
      background: var(--info-light);
      color: var(--info);
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 6px;
      color: var(--text-primary);
    }

    .form-group .form-input,
    .form-group .form-select {
      width: 100%;
      padding: 8px 12px;
      font-size: 13px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--white);
      font-family: inherit;
    }

    .form-group .form-input:focus,
    .form-group .form-select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79, 110, 247, 0.1);
    }

    .form-group .form-textarea {
      width: 100%;
      min-height: 280px;
      padding: 8px 12px;
      font-size: 13px;
      font-family: var(--font-mono);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--white);
      resize: vertical;
    }

    .form-group .form-textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79, 110, 247, 0.1);
    }

    .form-hint {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .form-hint.success {
      color: var(--success);
    }

    .form-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 24px;
      background: var(--success);
      color: #fff;
      font-size: 13px;
      border-radius: var(--radius);
      box-shadow: 0 4px 12px rgba(46, 204, 113, 0.3);
      z-index: 2000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s;
    }

    .toast.show {
      opacity: 1;
      visibility: visible;
    }

    .toast.error {
      background: var(--danger);
      box-shadow: 0 4px 12px rgba(231, 76, 60, 0.3);
    }

    .toast.loading {
      background: var(--primary);
      box-shadow: 0 4px 12px rgba(79, 110, 247, 0.3);
    }

    .prompt-tip {
      background: var(--info-light);
      border-left: 3px solid var(--info);
      padding: 10px 14px;
      border-radius: 0 var(--radius) var(--radius) 0;
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="page-container">
    <div class="page-title">🔧 系统配置</div>
    <div class="page-subtitle">配置模型B互审接口、iData平台Cookie及其他系统参数</div>

    <div class="toast" id="toast"></div>

    <!-- 区域A：API连接配置 -->
    <div class="config-card">
      <div class="config-card-header">
        <span class="config-card-title">🤖 模型B API 连接配置</span>
        <span class="status-badge info" id="modelbStatusBadge">加载中...</span>
      </div>
      <div class="config-desc">
        配置模型B互审接口的 API 地址和密钥，用于自动调用模型B进行差异化复核。如未配置，将使用 Mock 模式（随机生成结果）。
      </div>

      <div class="form-group">
        <label>大模型供应商</label>
        <select class="form-select" id="modelbProvider" onchange="onModelBProviderChange()">
          <option value="">-- 请选择 --</option>
          <option value="deepseek">DeepSeek</option>
          <option value="minimax">MiniMax</option>
          <option value="zhipu">智谱 GLM</option>
          <option value="kimi">Kimi (Moonshot)</option>
          <option value="qwen">通义千问 (DashScope)</option>
          <option value="custom">自定义</option>
        </select>
      </div>

      <div class="form-group">
        <label>API 地址</label>
        <input type="text" class="form-input" id="modelbApiUrl" placeholder="选择供应商后自动填充，或自定义输入">
      </div>

      <div class="form-group">
        <label>API Key</label>
        <div class="form-hint success" id="modelbKeyHint" style="display: none;">✔ API Key 已配置（留空则保留原值）</div>
        <input type="password" class="form-input" id="modelbApiKey" placeholder="填写对应平台的 API Key">
      </div>

      <div class="form-group">
        <label>模型名称</label>
        <input type="text" class="form-input" id="modelbModelName" placeholder="选择供应商后自动填充，可手动修改" style="max-width: 300px;">
      </div>

      <div class="form-actions">
        <button class="btn btn-default" onclick="testModelB()">测试连接</button>
        <button class="btn btn-primary" onclick="saveModelB()">保存配置</button>
      </div>
    </div>

    <!-- 区域B：互检提示词 -->
    <div class="config-card">
      <div class="config-card-header">
        <span class="config-card-title">📝 互检提示词</span>
      </div>
      <div class="prompt-tip">
        💡 此提示词将用于模型B对模型A审核结果进行差异化复核。如为空，则使用与模型A相同的审核标准。
      </div>
      <div class="form-group">
        <textarea class="form-textarea" id="modelbPromptText" placeholder="请输入模型B进行差异互检时使用的提示词..."></textarea>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" onclick="saveModelBPrompt()">💾 保存提示词</button>
      </div>
    </div>
  </div>

  <script>
    var MODELB_PROVIDERS = {
      'deepseek': { name: 'DeepSeek', apiUrl: 'https://api.deepseek.com/chat/completions', model: 'deepseek-chat' },
      'minimax':  { name: 'MiniMax',  apiUrl: 'https://api.minimaxi.com/v1/chat/completions', model: 'MiniMax-M2.7' },
      'zhipu':    { name: '智谱 GLM', apiUrl: 'https://open.bigmodel.cn/api/paas/v4/chat/completions', model: 'glm-4' },
      'kimi':     { name: 'Kimi (Moonshot)', apiUrl: 'https://api.moonshot.cn/v1/chat/completions', model: 'moonshot-v1-8k' },
      'qwen':     { name: '通义千问 (DashScope)', apiUrl: 'https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions', model: 'qwen-turbo' },
      'custom':   { name: '自定义',   apiUrl: '', model: '' }
    };

    var MODELB_PROMPT_KEY = 'modelb_review_prompt';

    // ========== 模型B配置 ==========
    function onModelBProviderChange() {
      var provider = document.getElementById('modelbProvider').value;
      var cfg = MODELB_PROVIDERS[provider];
      if (cfg) {
        document.getElementById('modelbApiUrl').value = cfg.apiUrl;
        document.getElementById('modelbModelName').value = cfg.model;
      }
      if (provider === 'custom') {
        document.getElementById('modelbApiUrl').value = '';
        document.getElementById('modelbModelName').value = '';
        document.getElementById('modelbApiUrl').focus();
      }
    }

    function resolveProviderByUrl(url) {
      if (!url) return '';
      for (var key in MODELB_PROVIDERS) {
        if (key === 'custom') continue;
        if (url.indexOf(MODELB_PROVIDERS[key].apiUrl) !== -1 || MODELB_PROVIDERS[key].apiUrl.indexOf(url) !== -1) {
          return key;
        }
      }
      return 'custom';
    }

    function updateModelBStatusUI(data) {
      var badge = document.getElementById('modelbStatusBadge');
      var keyHint = document.getElementById('modelbKeyHint');
      if (data.is_configured) {
        var supplierName = MODELB_PROVIDERS[data.supplier] ? MODELB_PROVIDERS[data.supplier].name : (data.supplier || '自定义');
        badge.textContent = '✔ 已配置（' + supplierName + '）';
        badge.className = 'status-badge success';
        if (keyHint) keyHint.style.display = 'block';
      } else {
        badge.textContent = '⚠ 未配置（Mock模式）';
        badge.className = 'status-badge warning';
        if (keyHint) keyHint.style.display = 'none';
      }
    }

    function loadModelBStatus() {
      fetch('/api/config/modelb')
        .then(function(response) { return response.json(); })
        .then(function(data) {
          updateModelBStatusUI(data);
          if (data.api_url) {
            document.getElementById('modelbApiUrl').value = data.api_url;
          }
          if (data.model_name) {
            document.getElementById('modelbModelName').value = data.model_name;
          }
          if (data.supplier) {
            document.getElementById('modelbProvider').value = data.supplier;
          } else if (data.api_url) {
            var providerKey = resolveProviderByUrl(data.api_url);
            document.getElementById('modelbProvider').value = providerKey;
          }
        })
        .catch(function() {
          document.getElementById('modelbStatusBadge').textContent = '加载失败';
          document.getElementById('modelbStatusBadge').className = 'status-badge warning';
        });
    }

    function saveModelB() {
      var provider = document.getElementById('modelbProvider').value;
      var apiUrl = document.getElementById('modelbApiUrl').value.trim();
      var apiKey = document.getElementById('modelbApiKey').value.trim();
      var modelName = document.getElementById('modelbModelName').value.trim();

      if (!provider) {
        showToast('请先选择大模型供应商', true);
        return;
      }
      if (!apiUrl) {
        showToast('请填写 API 地址（选择供应商后自动填充）', true);
        return;
      }
      if (!modelName) {
        showToast('请填写模型名称（选择供应商后自动填充）', true);
        return;
      }

      fetch('/api/config/modelb', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          api_url: apiUrl,
          api_key: apiKey,
          model_name: modelName,
          supplier: provider
        })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.success) {
          showToast(data.message || '配置已保存');
          updateModelBStatusUI({
            is_configured: data.is_configured,
            supplier: data.supplier,
            model_name: data.model_name
          });
          document.getElementById('modelbApiKey').value = '';
        } else {
          showToast(data.message || '保存失败', true);
        }
      })
      .catch(function(error) {
        showToast('保存失败: ' + error.message, true);
      });
    }

    function testModelB() {
      var provider = document.getElementById('modelbProvider').value;
      var apiUrl = document.getElementById('modelbApiUrl').value.trim();
      var apiKey = document.getElementById('modelbApiKey').value.trim();
      var modelName = document.getElementById('modelbModelName').value.trim();

      if (!provider) {
        showToast('请先选择大模型供应商', true);
        return;
      }
      if (!apiUrl) {
        showToast('请填写 API 地址', true);
        return;
      }
      if (!modelName) {
        showToast('请填写模型名称', true);
        return;
      }
      if (!apiKey) {
        showToast('请输入 API Key', true);
        return;
      }

      showToast('正在测试连接...', false, true);

      fetch('/api/config/modelb-test', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ api_url: apiUrl, api_key: apiKey, model_name: modelName })
      })
      .then(function(response) { return response.json(); })
      .then(function(data) {
        if (data.success) {
          showToast(data.message);
        } else {
          showToast(data.message || '连接失败', true);
        }
      })
      .catch(function(error) {
        showToast('连接失败: ' + error.message, true);
      });
    }

    // ========== 互检提示词 ==========
    function loadModelBPrompt() {
      var stored = localStorage.getItem(MODELB_PROMPT_KEY);
      if (stored) {
        document.getElementById('modelbPromptText').value = stored;
      }
    }

    function saveModelBPrompt() {
      var text = document.getElementById('modelbPromptText').value.trim();
      localStorage.setItem(MODELB_PROMPT_KEY, text);
      showToast('提示词已保存');
    }

    // ========== 提示 ==========
    function showToast(message, isError, isLoading) {
      var toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast';
      if (isError) {
        toast.className += ' error';
      } else if (isLoading) {
        toast.className += ' loading';
      }
      toast.className += ' show';
      setTimeout(function() {
        toast.classList.remove('show');
      }, 3000);
    }

    // 页面加载
    document.addEventListener('DOMContentLoaded', function() {
      loadModelBStatus();
      loadModelBPrompt();
    });
  </script>
</body>
</html>
