<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据看板</title>
  <link rel="stylesheet" href="/static/common.css">
  <script src="https://cdn.jsdelivr.net/npm/apexcharts@3.45.0/dist/apexcharts.min.js"></script>
  <style>
    .dashboard-page {
      padding: 20px 24px;
    }

    /* 成功提示横幅 */
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 24px;
      background: var(--success);
      color: #fff;
      font-size: 13px;
      border-radius: var(--radius);
      box-shadow: 0 4px 12px rgba(46, 204, 113, 0.3);
      z-index: 2000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s;
    }

    .toast.show {
      opacity: 1;
      visibility: visible;
    }

    /* 错误提示横幅 */
    .toast.error {
      background: var(--danger);
      box-shadow: 0 4px 12px rgba(231, 76, 60, 0.3);
    }

    /* 加载中提示横幅 */
    .toast.loading {
      background: var(--primary);
      box-shadow: 0 4px 12px rgba(79, 110, 247, 0.3);
    }

    /* 图表网格布局 */
    .chart-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 0.8fr;
      gap: 16px;
    }

    .chart-grid .chart-container:first-child,
    .chart-grid .chart-container:nth-child(2) {
      grid-column: span 1;
    }

    .chart-grid .chart-container:nth-child(3) {
      grid-column: 1;
    }

    .chart-grid .chart-container:nth-child(4) {
      grid-column: 2;
    }

    .chart-grid .chart-container:nth-child(5) {
      grid-column: 3;
    }

    @media (max-width: 1400px) {
      .chart-grid {
        grid-template-columns: 1fr 1fr;
      }
      .chart-grid .chart-container:nth-child(3),
      .chart-grid .chart-container:nth-child(4),
      .chart-grid .chart-container:nth-child(5) {
        grid-column: span 1;
      }
    }

    @media (max-width: 900px) {
      .chart-grid {
        grid-template-columns: 1fr;
      }
    }

    /* 兜底表格样式 */
    .fallback-table {
      width: 100%;
      font-size: 12px;
      border-collapse: collapse;
    }

    .fallback-table th,
    .fallback-table td {
      padding: 8px 10px;
      text-align: left;
      border-bottom: 1px solid var(--border-light);
    }

    .fallback-table th {
      background: #fafbfc;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .fallback-bar-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .fallback-bar-track {
      flex: 1;
      height: 8px;
      background: var(--border-light);
      border-radius: 4px;
      overflow: hidden;
    }

    .fallback-bar-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 4px;
      transition: width 0.8s ease;
    }

    .fallback-bar-value {
      font-size: 12px;
      color: var(--text-secondary);
      min-width: 32px;
      text-align: right;
    }

    /* ====== 标注员效能横向柱状图 ====== */
    .ae-row {
      display: grid;
      grid-template-columns: 90px 1fr 52px;
      align-items: center;
      gap: 8px;
      padding: 4px 4px;
      border-radius: 6px;
      transition: background 0.15s;
      user-select: none;
    }
    .ae-row:hover {
      background: #f0f4ff;
    }
    .ae-name {
      font-size: 12px;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 500;
    }
    .ae-bar-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .ae-bar-track {
      flex: 1;
      height: 10px;
      background: var(--border-light);
      border-radius: 5px;
      overflow: hidden;
    }
    .ae-bar-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 5px;
      transition: width 0.6s ease;
      min-width: 2px;
    }
    .ae-count {
      font-size: 11px;
      color: var(--text-secondary);
      min-width: 36px;
      text-align: right;
      white-space: nowrap;
    }
    .ae-accuracy {
      font-size: 12px;
      text-align: right;
      white-space: nowrap;
    }

    /* 排序切换按钮 */
    .sort-toggle button {
      background: none;
      border: 1px solid var(--border-light);
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 11px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
    }
    .sort-toggle button.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }
    .sort-toggle button:hover:not(.active) {
      border-color: var(--primary);
      color: var(--primary);
    }

    /* 筛选栏样式增强 */
    .filter-bar-top {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 12px 16px;
      margin-bottom: 20px;
    }

    .filter-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .filter-group label {
      font-size: 13px;
      color: var(--text-secondary);
      white-space: nowrap;
    }

    .filter-group .form-input {
      width: 130px;
    }

    /* 日期筛选区：按钮行和日期行垂直堆叠时，间距更紧凑 */
    .filter-group-btn {
      align-items: center;
    }
    .filter-group-date {
      align-items: center;
      padding-left: 4px;
      border-left: 2px solid var(--border-light);
    }
    .filter-group-date label {
      margin-right: 4px;
    }

    /* 按钮组筛选 */
    .filter-btn-group {
      display: flex;
      gap: 4px;
    }

    .filter-btn-group .btn {
      border-radius: 0;
      padding: 6px 12px;
      font-size: 13px;
    }

    .filter-btn-group .btn:first-child {
      border-radius: var(--radius) 0 0 var(--radius);
    }

    .filter-btn-group .btn:last-child {
      border-radius: 0 var(--radius) var(--radius) 0;
    }

    /* 缺失数据提示条 */
    .missing-instances-alert {
      display: none;
      padding: 10px 16px;
      background: #fee2e2;
      border: 1px solid #fecaca;
      border-radius: var(--radius);
      color: #dc2626;
      font-size: 13px;
      margin-bottom: 20px;
    }

    .missing-instances-alert.show {
      display: block;
    }

    /* 统计卡片无数据状态 */
    .stat-value.no-data {
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="dashboard-page">
    <!-- 成功提示横幅 -->
    <div class="toast" id="toast">数据获取任务已提交，预计3分钟后完成同步</div>

    <!-- 页面标题 -->
    <div class="page-header">
      <div>
        <div class="page-title">数据看板</div>
        <div class="page-subtitle">实时监控商品审核质检核心指标与业务趋势</div>
      </div>
      <div class="header-right flex items-center gap-12">
        <span class="text-sm text-secondary" id="updateTime">数据更新：--</span>
      </div>
    </div>

    <!-- 缺失数据提示条 -->
    <div class="missing-instances-alert" id="missingInstancesAlert">
      ⚠️ 以下实例暂无数据：<span id="missingInstancesList"></span>。请检查 SQL 配置或数据源。
    </div>

    <!-- 筛选栏 -->
    <div class="filter-bar-top">
      <div class="filter-group">
        <label>实例筛选：</label>
        <div class="filter-btn-group" id="instanceBtnGroup">
          <!-- 动态生成按钮 -->
        </div>
      </div>
      <div class="filter-group filter-group-btn">
        <label>数据周期：<span title="筛选的是商品数据的发生日期，非批次拉取时间" style="cursor:help;">📋</span></label>
        <div class="filter-btn-group" id="periodBtnGroup">
          <button class="btn btn-primary active" data-period="7" onclick="switchPeriod(this, 7)">近7天</button>
          <button class="btn btn-default" data-period="30" onclick="switchPeriod(this, 30)">近30天</button>
          <button class="btn btn-default" data-period="month" onclick="switchPeriod(this, 'month')">本月</button>
          <button class="btn btn-default" data-period="custom" onclick="switchPeriod(this, 'custom')">自定义</button>
        </div>
      </div>
      <div class="filter-group filter-group-date" id="customDateRange" style="display:none;">
        <label>日期范围：</label>
        <input type="date" class="form-input" id="filterStartDate" style="width:130px;">
        <span class="text-muted">至</span>
        <input type="date" class="form-input" id="filterEndDate" style="width:130px;">
      </div>
      <div class="filter-group">
        <button class="btn btn-primary btn-sm" id="btnQuery" onclick="filterByDateRange()">查询</button>
        <button class="btn btn-default btn-sm" onclick="resetDateRange()">重置</button>
      </div>
    </div>

    <!-- 统计卡片行 -->
    <div class="stat-row">
      <div class="stat-card fade-in">
        <div class="stat-icon blue">📊</div>
        <div class="stat-info">
          <div class="stat-value" id="statTotal">--</div>
          <div class="stat-label">审核总数</div>
          <div class="stat-change" id="statTotalChange" style="display: none;">&nbsp;</div>
          <div class="stat-debug" id="statTotalDebug" style="display: none; font-size: 11px; color: #dc2626; margin-top: 4px;"></div>
        </div>
      </div>
      <div class="stat-card fade-in">
        <div class="stat-icon red">⚠️</div>
        <div class="stat-info">
          <div class="stat-value" id="statViolation">--</div>
          <div class="stat-label">违规率</div>
          <div class="stat-change" id="statViolationChange" style="display: none;">&nbsp;</div>
        </div>
      </div>
      <div class="stat-card fade-in">
        <div class="stat-icon green">✓</div>
        <div class="stat-info">
          <div class="stat-value" id="statAccuracy">--%</div>
          <div class="stat-label">大模型审核准确率</div>
          <div class="stat-change" id="statAccuracyChange" style="display: none;">&nbsp;</div>
        </div>
      </div>
      <div class="stat-card fade-in clickable" id="disagreeCard" onclick="jumpToModelTask()">
        <div class="stat-icon orange">🤖</div>
        <div class="stat-info">
          <div class="stat-value" id="statDisagree">--%</div>
          <div class="stat-label">机审不一致率</div>
          <div class="stat-change" id="statDisagreeChange" style="display: none;">&nbsp;</div>
        </div>
      </div>
    </div>

    <!-- 图表区域 -->
    <div class="chart-grid">
      <!-- 趋势图区域：违规率 + 准确率并排 -->
      <div class="chart-container">
        <div class="chart-header">
          <span class="chart-title">📈 违规率趋势</span>
        </div>
        <div class="chart-body">
          <div id="trendChart" style="height: 260px;"></div>
          <div id="trendFallback" style="display: none;">
            <table class="fallback-table">
              <thead>
                <tr><th>日期</th><th>违规率</th><th>环比变化</th></tr>
              </thead>
              <tbody id="trendFallbackBody"></tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="chart-container">
        <div class="chart-header">
          <span class="chart-title">📈 大模型审核准确率趋势</span>
        </div>
        <div class="chart-body">
          <div id="accuracyChart" style="height: 260px;"></div>
          <div id="accuracyFallback" style="display: none;">
            <table class="fallback-table">
              <thead>
                <tr><th>日期</th><th>准确率</th><th>环比变化</th></tr>
              </thead>
              <tbody id="accuracyFallbackBody"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- 违规原因分布 -->
      <div class="chart-container">
        <div class="chart-header">
          <span class="chart-title">🎯 违规原因分布</span>
          <span class="text-sm text-secondary" id="reasonChartSubtitle"></span>
        </div>
        <div class="chart-body">
          <div id="reasonChart" style="height: 280px;"></div>
          <div id="reasonOtherDetail"></div>
          <div id="reasonFallback" style="display: none;">
            <table class="fallback-table">
              <thead>
                <tr><th>违规原因</th><th>占比</th><th>数量</th></tr>
              </thead>
              <tbody id="reasonFallbackBody"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- 📊 标注员效能概览 -->
      <div class="chart-container">
        <div class="chart-header">
          <span class="chart-title">📊 标注员效能概览</span>
          <span class="badge badge-primary">今日</span>
          <div class="sort-toggle" style="margin-left: auto;">
            <button id="workerSortBtn" class="btn btn-sm btn-ghost active" onclick="toggleWorkerSort()" title="切换排序">
              <span id="workerSortLabel">按准确率</span> ↓
            </button>
          </div>
        </div>
        <div class="chart-body">
          <!-- 横向柱状图容器 -->
          <div id="annotatorEfficiencyChart" style="padding: 8px 0;"></div>
          <!-- 兜底表格（charts 未加载时使用） -->
          <div id="workerFallback" style="display: none;">
            <table class="fallback-table">
              <thead>
                <tr><th>标注员</th><th>完成量</th><th>准确率</th></tr>
              </thead>
              <tbody id="workerFallbackBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>


  <script>
    // ====== 实例名称映射 ======
    const INSTANCE_NAMES = {
      "ZJWC": "浙江网超",
      "HWCS": "浙江乐采网超",
      "HNLCWC": "湖南乐采网超",
      "YNLCY": "云南乐采云",
      "GXLCY": "广西乐采云"
    };

    // ====== 当前选中状态 ======
    let currentInstance = 'all';
    let selectedInstances = [];  // 当前选中的具体实例列表
    let currentInstancesData = {};  // 存储各实例数据
    let allInstanceCodes = [];   // 所有实例编码

    // ====== 日期工具函数 ======
    function getYesterdayStr() {
      var today = new Date();
      var yesterday = new Date(today);
      yesterday.setDate(yesterday.getDate() - 1);
      var yyyy = yesterday.getFullYear();
      var mm = String(yesterday.getMonth() + 1).padStart(2, '0');
      var dd = String(yesterday.getDate()).padStart(2, '0');
      return yyyy + '-' + mm + '-' + dd;
    }

    function formatDateStr(date) {
      var yyyy = date.getFullYear();
      var mm = String(date.getMonth() + 1).padStart(2, '0');
      var dd = String(date.getDate()).padStart(2, '0');
      return yyyy + '-' + mm + '-' + dd;
    }

    // ====== 初始化日期筛选默认值 ======
    function initDateDefaults() {
      var yesterdayStr = getYesterdayStr();

      // 开始日期：前7天（昨天-6天）
      var yesterday = new Date();
      yesterday.setDate(yesterday.getDate() - 1);
      var weekAgo = new Date(yesterday);
      weekAgo.setDate(weekAgo.getDate() - 6);
      var weekAgoStr = formatDateStr(weekAgo);

      var startEl = document.getElementById('filterStartDate');
      var endEl = document.getElementById('filterEndDate');
      startEl.value = weekAgoStr;
      endEl.value = yesterdayStr;

      // 设置最大可选日期为昨天
      startEl.setAttribute('max', yesterdayStr);
      endEl.setAttribute('max', yesterdayStr);

      // 默认隐藏自定义日期输入、选中近7天
      document.getElementById('customDateRange').style.display = 'none';
      highlightPeriodBtn('7');
    }

    // 高亮指定周期按钮
    function highlightPeriodBtn(period) {
      var group = document.getElementById('periodBtnGroup');
      if (!group) return;
      var btns = group.querySelectorAll('.btn');
      btns.forEach(function(b) {
        var p = b.getAttribute('data-period');
        if (p === String(period)) {
          b.classList.remove('btn-default');
          b.classList.add('btn-primary', 'active');
        } else {
          b.classList.remove('btn-primary', 'active');
          b.classList.add('btn-default');
        }
      });
    }

    // 取消所有周期按钮高亮
    function clearPeriodHighlight() {
      var group = document.getElementById('periodBtnGroup');
      if (!group) return;
      var btns = group.querySelectorAll('.btn');
      btns.forEach(function(b) {
        b.classList.remove('btn-primary', 'active');
        b.classList.add('btn-default');
      });
    }

    // 根据当前日期范围自动匹配周期按钮
    function autoMatchPeriodBtn() {
      var startDate = document.getElementById('filterStartDate').value;
      var endDate = document.getElementById('filterEndDate').value;
      var yesterdayStr = getYesterdayStr();

      if (!startDate || !endDate || endDate !== yesterdayStr) {
        // 不是标准结束日期，显示为自定义
        showCustomMode();
        return;
      }

      var yesterday = new Date();
      yesterday.setDate(yesterday.getDate() - 1);

      // 检查是否匹配近7天
      var weekAgo = new Date(yesterday);
      weekAgo.setDate(weekAgo.getDate() - 6);
      if (startDate === formatDateStr(weekAgo)) {
        hideCustomMode();
        highlightPeriodBtn('7');
        return;
      }

      // 检查是否匹配近30天
      var monthAgo = new Date(yesterday);
      monthAgo.setDate(monthAgo.getDate() - 29);
      if (startDate === formatDateStr(monthAgo)) {
        hideCustomMode();
        highlightPeriodBtn('30');
        return;
      }

      // 检查是否匹配本月
      var monthStart = new Date(yesterday);
      monthStart.setDate(1);
      if (startDate === formatDateStr(monthStart)) {
        hideCustomMode();
        highlightPeriodBtn('month');
        return;
      }

      // 不匹配任何预设周期 → 自定义
      showCustomMode();
    }
    
    // 切换到自定义模式
    function showCustomMode() {
      document.getElementById('customDateRange').style.display = 'inline-flex';
      clearPeriodHighlight();
      document.querySelector('[data-period="custom"]').classList.remove('btn-default');
      document.querySelector('[data-period="custom"]').classList.add('btn-primary', 'active');
    }
    
    // 隐藏自定义日期输入
    function hideCustomMode() {
      document.getElementById('customDateRange').style.display = 'none';
    }

    // 切换周期
    window.switchPeriod = function(btn, period) {
      if (period === 'custom') {
        // 自定义模式：显示日期输入框，取消预设高亮
        document.getElementById('customDateRange').style.display = 'inline-flex';
        clearPeriodHighlight();
        document.querySelector('[data-period="custom"]').classList.remove('btn-default');
        document.querySelector('[data-period="custom"]').classList.add('btn-primary', 'active');
        // 不清空已有日期值，保持用户之前输入
        return;
      }

      // 预设周期：隐藏日期输入框，自动设置日期并查询
      document.getElementById('customDateRange').style.display = 'none';
      
      var yesterday = new Date();
      yesterday.setDate(yesterday.getDate() - 1);
      var yesterdayStr = getYesterdayStr();
      var startDate;

      if (period === 'month') {
        var monthStart = new Date(yesterday);
        monthStart.setDate(1);
        startDate = formatDateStr(monthStart);
      } else {
        var days = parseInt(period, 10);
        var start = new Date(yesterday);
        start.setDate(start.getDate() - (days - 1));
        startDate = formatDateStr(start);
      }

      document.getElementById('filterStartDate').value = startDate;
      document.getElementById('filterEndDate').value = yesterdayStr;
      highlightPeriodBtn(period);
      fetchDashboardStats(currentInstance);
    };

    // 日期选择器 change 事件监听
    function initDateChangeListeners() {
      var startEl = document.getElementById('filterStartDate');
      var endEl = document.getElementById('filterEndDate');

      function onDateChange() {
        // 如果用户选择了今天或更晚的日期，自动修正为昨天
        var yesterdayStr = getYesterdayStr();
        if (startEl.value && startEl.value > yesterdayStr) {
          startEl.value = yesterdayStr;
        }
        if (endEl.value && endEl.value > yesterdayStr) {
          endEl.value = yesterdayStr;
        }
        autoMatchPeriodBtn();
      }

      startEl.addEventListener('change', onDateChange);
      endEl.addEventListener('change', onDateChange);
    }

    // ====== 调用看板统计接口 ======
    function fetchDashboardStats(instanceFilter) {
      var startDate = document.getElementById('filterStartDate').value;
      var endDate = document.getElementById('filterEndDate').value;

      // 构建URL，传递日期参数（格式转换为 YYYYMMDD）
      var params = [];
      if (startDate) {
        params.push('start_date=' + startDate.replace(/-/g, ''));
      }
      if (endDate) {
        params.push('end_date=' + endDate.replace(/-/g, ''));
      }
      if (instanceFilter && instanceFilter !== 'all') {
        params.push('instances=' + instanceFilter);
      }

      var url = '/api/dashboard/stats';
      if (params.length > 0) {
        url += '?' + params.join('&');
      }

      fetch(url)
        .then(function(response) { return response.json(); })
        .then(function(data) {
          updateStatCards(data);
          updateMissingInstancesAlert(data.missing_instances);
          updateInstanceButtons(data.by_instance);
          // 更新趋势图
          updateTrendChart(data.by_date || []);
          // 更新违规原因分布图（使用接口返回的 top_violation_reasons 和 all_reasons_detail）
          updateReasonChart(data.top_violation_reasons || [], data.non_compliant_count || 0, data.all_reasons_detail || []);
          // ====== 更新标注员效能概览 ======
          window.annotatorStats = data.annotator_stats || [];
          renderAnnotatorEfficiency(window.annotatorStats);
        })
        .catch(function(error) {
          console.error('获取看板统计失败:', error);
        });
    }

    // ====== 更新违规原因分布图 ======
    function updateReasonChart(reasons, nonCompliantCount, allReasonsDetail) {
      // 保存全量明细，供"其他"展开使用
      window._allReasonsDetail = allReasonsDetail || [];
      window._currentReasonData = reasons || [];

      // 计算总违规次数（必须从 reasons 累加，确保中心数字 = 扇区之和）
      // 不能用 non_compliant_count，因为可能和 reasons 不同源
      var totalViolations = 0;
      if (reasons && reasons.length > 0) {
        totalViolations = reasons.reduce(function(s, d) { return s + (d.value || 0); }, 0);
      }
      // 如果 reasons 为空，fallback 到 nonCompliantCount（显示用途）
      if (!totalViolations && nonCompliantCount) {
        totalViolations = nonCompliantCount;
      }

      // 更新副标题
      var subtitleEl = document.getElementById('reasonChartSubtitle');
      if (subtitleEl) {
        if (totalViolations > 0) {
          var standaloneCount = (reasons || []).filter(function(d) { return d.name !== '其他'; }).length;
          var otherItem = (reasons || []).find(function(d) { return d.name === '其他'; });
          var otherInfo = otherItem ? '（含其他 ' + (otherItem.value || 0).toLocaleString() + ' 例）' : '';
          subtitleEl.textContent = '共 ' + totalViolations.toLocaleString() + ' 例违规，' + standaloneCount + ' 类主要类型' + otherInfo;
        } else {
          subtitleEl.textContent = '';
        }
      }

      if (reasons && reasons.length > 0 && totalViolations > 0) {
        initReasonChart(reasons, totalViolations);
      } else {
        // 无数据时显示空状态
        var chartEl = document.getElementById('reasonChart');
        if (chartEl) {
          chartEl.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:280px;color:var(--text-muted);">暂无违规数据</div>';
        }
      }
    }

      // 渲染标注员效能横向柱状图（纯 HTML/CSS，不依赖 ApexCharts）
      function renderAnnotatorEfficiency(data) {
        var container = document.getElementById('annotatorEfficiencyChart');
        if (!container) return;

        if (!data || data.length === 0) {
          container.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:260px;color:var(--text-muted);font-size:13px;">暂无标注员数据</div>';
          return;
        }

        // 排序
        var sorted = data.slice().sort(function(a, b) {
          if (window.annotatorSortMode === 'accuracy') {
            // 从低到高排（准确率低的优先关注）
            var accA = a.today_accuracy != null ? a.today_accuracy : 100;
            var accB = b.today_accuracy != null ? b.today_accuracy : 100;
            return accA - accB;
          } else {
            // 按标注量从高到低
            return (b.today_annotated || 0) - (a.today_annotated || 0);
          }
        });

        var maxCount = Math.max.apply(null, sorted.map(function(d) { return d.today_annotated || 0; }));
        if (maxCount === 0) maxCount = 1;

        var html = '<div style="display:flex;flex-direction:column;gap:6px;">';
        sorted.forEach(function(d) {
          var name = d.name || d.username || '未知';
          var count = d.today_annotated || 0;
          var accuracy = d.today_accuracy;
          var barPct = Math.round(count / maxCount * 100);
          var hasAccuracy = accuracy != null && accuracy !== '';

          // 准确率颜色
          var accColor = '#6b7280'; // 无数据
          var accText = '--';
          if (hasAccuracy) {
            if (accuracy >= 90) {
              accColor = '#22c55e'; // 绿色
            } else if (accuracy >= 80) {
              accColor = '#eab308'; // 黄色
            } else {
              accColor = '#ef4444'; // 红色
            }
            accText = accuracy + '%';
          }

          html += '<div class="ae-row" onclick="jumpToAnnotator(\'' + encodeURIComponent(name) + '\')" title="点击查看 ' + name + ' 的详情" style="cursor:pointer;">' +
            '<div class="ae-name">' + name + '</div>' +
            '<div class="ae-bar-wrap">' +
              '<div class="ae-bar-track">' +
                '<div class="ae-bar-fill" style="width:' + barPct + '%;"></div>' +
              '</div>' +
              '<span class="ae-count">' + count + ' 条</span>' +
            '</div>' +
            '<div class="ae-accuracy" style="color:' + accColor + ';font-weight:600;">' + accText + '</div>' +
          '</div>';
        });
        html += '</div>';
        container.innerHTML = html;
      }

      let trendChart, accuracyChart, reasonChart, workerChart;
      const chartsReady = typeof ApexCharts !== 'undefined';

      // 将后端 by_date 数据转换为图表格式
      function parseTrendData(byDate) {
        if (!byDate || !Array.isArray(byDate) || byDate.length === 0) {
          return { categories: [], violationRates: [], totals: [] };
        }

        var categories = [];
        var violationRates = [];
        var totals = [];

        for (var i = 0; i < byDate.length; i++) {
          var item = byDate[i];
          // 转换日期格式 YYYYMMDD -> MM/DD
          var dateStr = item.date || '';
          if (dateStr.length === 8) {
            categories.push(dateStr.slice(4, 6) + '/' + dateStr.slice(6, 8));
          } else {
            categories.push(dateStr);
          }
          violationRates.push(item.violation_rate || 0);
          totals.push(item.total || 0);
        }

        return { categories: categories, violationRates: violationRates, totals: totals };
      }

          var chartEl = document.getElementById('reasonChart');
          if (chartEl) {
            chartEl.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:280px;color:var(--text-muted);">暂无违规数据</div>';
          }
          return;
        }

        // 计算总违规数（必须从 reasonData 累加，确保和扇区一致）
        var total = reasonData.reduce(function(s, d) { return s + (d.value || 0); }, 0);
        // 如果 reasonData 为空，才使用传入的 totalViolations
        if (!total && totalViolations) {
          total = totalViolations;
        }
        if (!total || total <= 0) {
          var chartEl = document.getElementById('reasonChart');
          if (chartEl) {
            chartEl.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:280px;color:var(--text-muted);">暂无违规数据</div>';
          }
          return;
        }

        // 饼图使用后端动态分组数据（>=2% 独立，<2% 归入"其他"，后端已处理）
        // 不再在前端做 Top10 截断
        var displayData = reasonData.map(function(d) {
          var pct = d.percentage;
          if (pct === undefined || pct === null) {
            pct = (d.value || 0) / total * 100;
          }
          return {
            name: d.name,
            value: d.value || 0,
            percentage: parseFloat(pct.toFixed(1))
          };
        });

        // 找出"其他"项，提取明细
        var otherItem = displayData.find(function(d) { return d.name === '其他'; });
        var otherDetailItems = [];
        var standaloneCount = displayData.length;
        if (otherItem) {
          otherDetailItems = displayData.filter(function(d) { return d.name === '其他'; });
          standaloneCount = displayData.length - 1;
        }

        // 颜色配置
        var colors = [
          '#4f6ef7', '#2ecc71', '#f39c12', '#e74c3c', '#17a2b8',
          '#9b59b6', '#1abc9c', '#e67e22', '#34495e', '#f1c40f',
          '#e91e63', '#00bcd4', '#795548'
        ];

        // 更新副标题
        var subtitleEl = document.getElementById('reasonChartSubtitle');
        if (subtitleEl) {
          var otherInfo = otherItem ? '（含其他 ' + otherItem.value + ' 例）' : '';
          subtitleEl.textContent = '共 ' + total.toLocaleString() + ' 例违规，' + standaloneCount + ' 类主要类型' + otherInfo;
        }

        // 设置饼图选项
        var _chartData = displayData;  // 保存引用供 tooltip 和 legend 使用
        const options = {
          chart: {
            type: 'donut',
            height: 280,
            fontFamily: 'inherit',
            events: {
              legendClick: function(chartContext, seriesIndex, config) {
                // 点击图例时，若为"其他"则切换展开状态
                var label = config.legendItems[seriesIndex].text;
                if (label === '其他') {
                  toggleOtherDetail();
                }
              }
            }
          },
          series: _chartData.map(function(d) { return d.value; }),
          labels: _chartData.map(function(d) { return d.name; }),
          colors: colors.slice(0, _chartData.length),
          plotOptions: {
            pie: {
              donut: {
                size: '55%',
                labels: {
                  show: true,
                  name: { fontSize: '11px', color: '#6b7280' },
                  value: { fontSize: '14px', fontWeight: 600, color: '#1f2937', formatter: function(val) { return Number(val).toLocaleString(); } },
                  total: {
                    show: true,
                    label: '违规总数',
                    formatter: function() { return Number(total).toLocaleString(); }
                  }
                }
              }
            }
          },
          legend: {
            position: 'right',
            fontSize: '11px',
            labels: { colors: '#6b7280' },
            markers: { width: 8, height: 8, radius: 2 },
            itemMargin: { vertical: 3 },
            formatter: function(seriesName, opts) {
              var val = opts.w.globals.series[opts.seriesIndex];
              return seriesName + ': ' + Number(val).toLocaleString();
            }
          },
          dataLabels: { enabled: false },
          tooltip: {
            enabled: true,
            custom: function(_ref) {
              var dataPointIndex = _ref.dataPointIndex;
              // 判空保护：防止 dataPointIndex 无效或 _chartData 未定义
              if (dataPointIndex < 0 || !_chartData || !_chartData[dataPointIndex]) {
                return '';
              }
              var d = _chartData[dataPointIndex];
              return '<div style="padding:8px 12px;font-size:12px;">' +
                '<div style="font-weight:600;margin-bottom:4px;">' + (d.name || '') + '</div>' +
                '<div>次数: ' + (d.value || 0).toLocaleString() + ' 例</div>' +
                '<div>占比: ' + ((d.percentage || 0).toFixed(1)) + '%</div>' +
                '</div>';
            }
          }
        };

        // 如果已有图表，先销毁
        if (reasonChart) {
          try { reasonChart.destroy(); } catch(e) {}
          reasonChart = null;
        }

        var chartEl = document.querySelector('#reasonChart');
        if (chartEl) {
          reasonChart = new ApexCharts(chartEl, options);
          reasonChart.render();
        }

        // 渲染"其他"展开明细（从 all_reasons_detail 中排除已独立显示的）
        renderOtherDetail(otherDetailItems, total);
      }

      // "其他"明细展开状态
      var _otherDetailExpanded = false;
      function renderOtherDetail(otherItems, total) {
        var detailEl = document.getElementById('reasonOtherDetail');
        if (!detailEl) return;
        if (!otherItems || otherItems.length === 0) {
          detailEl.style.display = 'none';
          return;
        }
        var otherItem = otherItems[0];
        var detailData = [];
        // 从 window._allReasonsDetail 中取被归入"其他"的所有类型
        if (window._allReasonsDetail && window._allReasonsDetail.length > 0) {
          var standaloneNames = {};
          var displayNames = window._currentReasonData || [];
          displayNames.forEach(function(d) {
            if (d.name !== '其他') standaloneNames[d.name] = true;
          });
          detailData = window._allReasonsDetail.filter(function(d) {
            return !standaloneNames[d.name];
          });
        }
        if (detailData.length === 0) {
          detailEl.style.display = 'none';
          return;
        }
        var totalOther = otherItem.value;
        var rows = detailData.map(function(d) {
          var pct = d.percentage !== undefined ? d.percentage : (d.value / total * 100);
          return '<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #f0f0f0;font-size:12px;">' +
            '<span>' + d.name + '</span>' +
            '<span style="color:#6b7280;">' + d.value.toLocaleString() + ' 例（' + pct.toFixed(1) + '%）</span>' +
            '</div>';
        }).join('');
        detailEl.innerHTML =
          '<div style="margin-top:8px;padding:10px;background:#f9fafb;border-radius:8px;border:1px solid #e5e7eb;">' +
          '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">' +
          '<span style="font-size:12px;font-weight:600;color:#374151;">其他（&lt;2%）明细（' + detailData.length + ' 类，共 ' + totalOther.toLocaleString() + ' 例）</span>' +
          '<span style="font-size:11px;color:#6b7280;">点击图例"其他"关闭</span>' +
          '</div>' +
          '<div style="max-height:200px;overflow-y:auto;">' + rows + '</div>' +
          '</div>';
        detailEl.style.display = _otherDetailExpanded ? 'block' : 'none';
      }

      function toggleOtherDetail() {
        _otherDetailExpanded = !_otherDetailExpanded;
        var detailEl = document.getElementById('reasonOtherDetail');
        if (detailEl) detailEl.style.display = _otherDetailExpanded ? 'block' : 'none';
      }

      function initWorkerChart() {
        // 标注员效能概览使用纯 HTML/CSS 横向柱状图（始终渲染，不依赖 ApexCharts）
        renderAnnotatorEfficiency(window.annotatorStats || []);
      }

      // ====== 兜底渲染 ======
      function showTrendFallback(data) {
        document.getElementById('trendChart').style.display = 'none';
        document.getElementById('trendFallback').style.display = 'block';
        var tbody = document.getElementById('trendFallbackBody');
        var html = '';
        data.series.forEach(function(v, i) {
          var prev = i > 0 ? data.series[i - 1] : v;
          var change = ((v - prev) / prev * 100).toFixed(2);
          var cls = change >= 0 ? 'text-danger' : 'text-success';
          var arrow = change >= 0 ? '▲' : '▼';
          html += '<tr>' +
            '<td>' + data.categories[i] + '</td>' +
            '<td class="font-semibold">' + v.toFixed(2) + '%</td>' +
            '<td class="' + cls + '">' + arrow + ' ' + Math.abs(change) + '%</td>' +
            '</tr>';
        });
        tbody.innerHTML = html;
      }

      function showAccuracyFallback(data) {
        document.getElementById('accuracyChart').style.display = 'none';
        document.getElementById('accuracyFallback').style.display = 'block';
        var tbody = document.getElementById('accuracyFallbackBody');
        var html = '';
        data.series.forEach(function(v, i) {
          var prev = i > 0 ? data.series[i - 1] : v;
          var change = ((v - prev) / prev * 100).toFixed(2);
          var cls = change >= 0 ? 'text-success' : 'text-danger';
          var arrow = change >= 0 ? '▲' : '▼';
          html += '<tr>' +
            '<td>' + data.categories[i] + '</td>' +
            '<td class="font-semibold">' + v.toFixed(1) + '%</td>' +
            '<td class="' + cls + '">' + arrow + ' ' + Math.abs(change) + '%</td>' +
            '</tr>';
        });
        tbody.innerHTML = html;
      }

      function showReasonFallback() {
        document.getElementById('reasonChart').style.display = 'none';
        document.getElementById('reasonFallback').style.display = 'block';
        var tbody = document.getElementById('reasonFallbackBody');
        var total = reasonData.reduce(function(s, d) { return s + d.value; }, 0);
        var maxVal = Math.max.apply(null, reasonData.map(function(d) { return d.value; }));
        var html = '';
        reasonData.forEach(function(d) {
          var pct = ((d.value / total) * 100).toFixed(1);
          html += '<tr>' +
            '<td>' + d.name + '</td>' +
            '<td>' +
              '<div class="fallback-bar-wrap">' +
                '<div class="fallback-bar-track"><div class="fallback-bar-fill" style="width:' + (d.value / maxVal * 100) + '%"></div></div>' +
                '<span class="fallback-bar-value">' + pct + '%</span>' +
              '</div>' +
            '</td>' +
            '<td>' + d.value + '</td>' +
            '</tr>';
        });
        tbody.innerHTML = html;
      }

      function showWorkerFallback() {
        // 统一走 renderAnnotatorEfficiency，隐藏图表容器
        var container = document.getElementById('annotatorEfficiencyChart');
        if (container) container.style.display = 'none';
        document.getElementById('workerFallback').style.display = 'block';
        var tbody = document.getElementById('workerFallbackBody');
        var sorted = (window.annotatorStats || []).slice().sort(function(a, b) {
          if (window.annotatorSortMode === 'accuracy') {
            var accA = a.today_accuracy != null ? a.today_accuracy : 100;
            var accB = b.today_accuracy != null ? b.today_accuracy : 100;
            return accA - accB;
          } else {
            return (b.today_annotated || 0) - (a.today_annotated || 0);
          }
        });
        var maxCount = Math.max.apply(null, sorted.map(function(d) { return d.today_annotated || 0; }));
        if (maxCount === 0) maxCount = 1;
        var html = '';
        sorted.forEach(function(d) {
          var name = d.name || d.username || '未知';
          var count = d.today_annotated || 0;
          var accuracy = d.today_accuracy;
          var accColor = accuracy != null && accuracy !== ''
            ? (accuracy >= 90 ? '#22c55e' : accuracy >= 80 ? '#eab308' : '#ef4444')
            : '#6b7280';
          var accText = accuracy != null && accuracy !== '' ? accuracy + '%' : '--';
          html += '<tr style="cursor:pointer;" onclick="jumpToAnnotator(\'' + encodeURIComponent(name) + '\')">' +
            '<td>' + name + '</td>' +
            '<td>' +
              '<div class="fallback-bar-wrap">' +
                '<div class="fallback-bar-track"><div class="fallback-bar-fill" style="width:' + Math.round(count / maxCount * 100) + '%"></div></div>' +
                '<span class="fallback-bar-value">' + count + '</span>' +
              '</div>' +
            '</td>' +
            '<td class="font-semibold" style="color:' + accColor + ';">' + accText + '</td>' +
            '</tr>';
        });
        tbody.innerHTML = html;
      }

      // ====== 交互 ======
      window.showLogHint = function() {
        alert('获取日志功能已移至【机审任务中心】，即将跳转。');
      };

      window.showToast = function() {
        var toast = document.getElementById('toast');
        toast.classList.add('show');
        setTimeout(function() {
          toast.classList.remove('show');
        }, 3000);
      };

      window.jumpToModelTask = function() {
        // 机审中心按实际拉取日期筛选，应使用今天而非看板的 T+1 日期
        var today = new Date();
        var endDate = today.toISOString().slice(0, 10); // 今天
        
        // 往前推7天
        var startDateObj = new Date(today);
        startDateObj.setDate(startDateObj.getDate() - 6);
        var startDate = startDateObj.toISOString().slice(0, 10);

        // 构建 URL 参数
        var params = '?start_date=' + startDate + '&end_date=' + endDate + '&review_status=completed';

        if (window.parent && window.parent.document) {
          var iframe = window.parent.document.querySelector('iframe');
          if (iframe) {
            iframe.src = 'model_task.html' + params;
            return;
          }
        }
        window.location.href = 'model_task.html' + params;
      };

      // ====== 初始化 ======
      document.addEventListener('DOMContentLoaded', function() {
        // 1. 初始化日期默认值（默认近7天，设置 max 为昨天）
        initDateDefaults();

        // 2. 绑定日期选择器 change 事件
        initDateChangeListeners();

        // 3. 获取后端真实数据（会同时更新图表和统计卡片）
        fetchDashboardStats();
      });
    </script>
</body>
</html>
