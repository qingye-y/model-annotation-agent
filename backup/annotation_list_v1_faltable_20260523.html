<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>标注任务</title>
  <link rel="stylesheet" href="/static/common.css">
  <script src="/static/config.js"></script>
  <script src="/static/common.js"></script>
  <style>
    .annotation-page {
      padding: 20px 24px;
    }

    /* 页面标题 */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .page-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
    }

    /* 统计摘要栏 */
    .stats-summary {
      display: flex;
      gap: 24px;
      padding: 12px 16px;
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .stats-group {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .stats-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 13px;
    }

    .stats-item .num {
      font-weight: 600;
      color: var(--text-primary);
    }

    .stats-item .label {
      color: var(--text-secondary);
    }

    .stats-item .divider {
      color: var(--border);
      margin: 0 8px;
    }

    .stats-group .btn {
      margin-left: 8px;
    }

    /* 批量操作按钮 */
    .batch-actions {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }

    .batch-btn {
      padding: 8px 16px;
      font-size: 13px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.2s;
    }

    .batch-btn.secondary {
      background: var(--white);
      border: 1px solid var(--border);
      color: var(--text-primary);
    }

    .batch-btn.secondary:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .batch-btn.primary {
      background: var(--primary);
      border: 1px solid var(--primary);
      color: #fff;
    }

    .batch-btn.primary:hover {
      background: #3b82f6;
    }

    /* 提交后灰色显示 */
    .submitted-row {
      opacity: 0.5;
      background: #f5f5f5;
    }

    /* 数据表格 */
    .annotation-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .annotation-table thead th {
      background: #fafbfc;
      color: var(--text-secondary);
      font-weight: 500;
      text-align: left;
      padding: 12px;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    .annotation-table tbody td {
      padding: 12px;
      border-bottom: 1px solid var(--border-light);
      color: var(--text-primary);
      vertical-align: middle;
    }

    .annotation-table tbody tr:hover {
      background: #f8f9ff;
    }

    /* 标注结果标签 */
    .tag-correct { background: var(--success-light); color: var(--success); padding: 2px 8px; border-radius: 3px; font-size: 12px; display: inline-block; }
    .tag-error { background: var(--danger-light); color: var(--danger); padding: 2px 8px; border-radius: 3px; font-size: 12px; display: inline-block; }
    .tag-ignore { background: var(--warning-light); color: var(--warning); padding: 2px 8px; border-radius: 3px; font-size: 12px; display: inline-block; }
    .tag-pending { color: var(--text-muted); font-size: 12px; }

    /* 标注规则标签 */
    .tag-rule {
      background: #e0e7ff;
      color: #4f6ef7;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 11px;
      display: inline-block;
    }

    /* 加载动画 */
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .loading-spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid var(--border);
      border-top-color: var(--warning);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-left: 4px;
    }

    /* 紧凑图片展示布局 */
    .image-compact {
      flex: 1;
      overflow-y: auto;
      padding-right: 8px;
    }

    .image-compact::-webkit-scrollbar {
      width: 6px;
    }

    .image-compact::-webkit-scrollbar-thumb {
      background: #d1d5db;
      border-radius: 3px;
    }

    .thumbnail-row {
      margin-bottom: 12px;
    }

    .thumbnail-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 6px;
    }

    .thumbnail-wrapper {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .thumbnail-img {
      width: 120px;
      height: 90px;
      object-fit: cover;
      border-radius: var(--radius);
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      border: 1px solid var(--border-light);
    }

    .thumbnail-img:hover {
      transform: scale(1.05);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    }

    /* 列表页操作按钮组 */
    .action-btn-group {
      display: flex;
      gap: 4px;
    }

    .action-btn {
      padding: 4px 8px;
      font-size: 11px;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.2s;
    }

    .action-btn.annotate {
      background: var(--primary);
      color: #fff;
    }

    .action-btn.annotate:hover {
      background: #3b82f6;
    }

    .action-btn.save {
      background: var(--success);
      color: #fff;
    }

    .action-btn.save:hover {
      background: #22c55e;
    }

    .action-btn.submit-btn {
      background: var(--warning);
      color: #fff;
    }

    .action-btn.submit-btn:hover {
      background: #f59e0b;
    }

    /* 行闪烁反馈 */
    @keyframes rowFlash {
      0% { background: rgba(34, 197, 94, 0.3); }
      100% { background: transparent; }
    }

    .row-flash {
      animation: rowFlash 1s ease-out;
    }

    /* 底部翻页栏 */
    .detail-modal-footer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 12px 20px;
      border-top: 1px solid var(--border-light);
      background: #fafbfc;
      flex-shrink: 0;
    }

    .detail-nav-btn {
      padding: 8px 16px;
      font-size: 13px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
    }

    .detail-nav-btn:hover:not(:disabled) {
      border-color: var(--primary);
      color: var(--primary);
    }

    .detail-nav-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .detail-progress {
      font-size: 14px;
      font-weight: 500;
    }

    .back-to-list-btn {
      padding: 8px 16px;
      font-size: 13px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
    }

    .back-to-list-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    /* 确认弹窗 */
    .confirm-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 3000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s;
    }

    .confirm-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .confirm-dialog {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 24px;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }

    .confirm-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .confirm-message {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 20px;
    }

    .confirm-buttons {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }

    /* ========== 标注详情弹窗 ========== */
    .detail-modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s;
    }

    .detail-modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .detail-modal {
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      width: 95%;
      max-width: 1200px;
      height: 90vh;
      display: flex;
      flex-direction: column;
      transform: scale(0.95);
      transition: transform 0.3s;
    }

    .detail-modal-overlay.active .detail-modal {
      transform: scale(1);
    }

    .detail-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-light);
      flex-shrink: 0;
    }

    .detail-modal-title {
      font-size: 16px;
      font-weight: 600;
    }

    .detail-modal-close {
      background: none;
      border: none;
      font-size: 24px;
      color: var(--text-muted);
      cursor: pointer;
      line-height: 1;
      padding: 4px 8px;
      border-radius: var(--radius);
    }

    .detail-modal-close:hover {
      background: var(--border-light);
      color: var(--text-primary);
    }

    .detail-modal-body {
      flex: 1;
      display: flex;
      overflow: hidden;
      padding: 20px;
      gap: 20px;
    }

    /* 左侧商品信息区 */
    .product-info {
      flex: 0 0 68%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .product-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--text-primary);
    }

    .product-meta {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .product-meta-item {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .product-meta-item .value {
      color: var(--text-primary);
      font-weight: 500;
    }

    /* 图片Tab */
    .image-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .image-tab {
      padding: 6px 16px;
      font-size: 13px;
      background: var(--border-light);
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.2s;
    }

    .image-tab.active {
      background: var(--primary);
      color: #fff;
    }

    .image-grid {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
      padding-right: 8px;
    }

    .image-grid::-webkit-scrollbar {
      width: 6px;
    }

    .image-grid::-webkit-scrollbar-thumb {
      background: #d1d5db;
      border-radius: 3px;
    }

    .image-item {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .image-item img {
      width: 100%;
      max-width: 400px;
      height: auto;
      border-radius: var(--radius);
      cursor: pointer;
      transition: transform 0.2s;
    }

    .image-item img:hover {
      transform: scale(1.01);
    }

    .image-item .image-label {
      font-size: 11px;
      color: var(--text-muted);
    }

    /* 右侧审核区 */
    .review-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
    }

    .review-card {
      background: #fafbfc;
      border-radius: var(--radius-lg);
      padding: 14px;
      border: 1px solid var(--border-light);
    }

    .review-card-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 10px;
    }

    .review-item {
      font-size: 12px;
      margin-bottom: 6px;
    }

    .review-item .label {
      color: var(--text-secondary);
      margin-right: 6px;
    }

    .review-item .value {
      color: var(--text-primary);
      font-weight: 500;
    }

    .review-item .value.success { color: var(--success); }
    .review-item .value.error { color: var(--danger); }
    .review-item .value.warning { color: var(--warning); }

    .collapse-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      padding: 8px 0;
      color: var(--text-secondary);
    }

    .collapse-toggle:hover {
      color: var(--text-primary);
    }

    .collapse-content {
      display: none;
    }

    .collapse-content.show {
      display: block;
    }

    /* 标注操作区 */
    .annotation-actions {
      padding: 16px;
      background: var(--white);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
    }

    .annotation-buttons {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }

    .annotation-btn {
      flex: 1;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 500;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .annotation-btn.correct {
      background: var(--white);
      border: 2px solid var(--success);
      color: var(--success);
    }

    .annotation-btn.correct.active,
    .annotation-btn.correct:hover {
      background: var(--success);
      color: #fff;
    }

    .annotation-btn.error {
      background: var(--white);
      border: 2px solid var(--danger);
      color: var(--danger);
    }

    .annotation-btn.error.active,
    .annotation-btn.error:hover {
      background: var(--danger);
      color: #fff;
    }

    .annotation-btn.ignore {
      background: var(--white);
      border: 2px solid var(--warning);
      color: var(--warning);
    }

    .annotation-btn.ignore.active,
    .annotation-btn.ignore:hover {
      background: var(--warning);
      color: #fff;
    }

    .annotation-inputs {
      display: none;
      gap: 12px;
      padding: 12px;
      background: #fafbfc;
      border-radius: var(--radius);
      margin-bottom: 16px;
    }

    .annotation-inputs.show {
      display: flex;
    }

    .annotation-inputs .form-group {
      flex: 1;
    }

    .annotation-inputs label {
      display: block;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .annotation-inputs select,
    .annotation-inputs input {
      width: 100%;
      padding: 6px 10px;
      font-size: 13px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .action-buttons {
      display: flex;
      gap: 12px;
    }

    .action-buttons .btn {
      flex: 1;
    }

    /* 底部翻页栏 */
    .detail-modal-footer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 12px 20px;
      border-top: 1px solid var(--border-light);
      background: #fafbfc;
      flex-shrink: 0;
    }

    .detail-nav-btn {
      padding: 8px 16px;
      font-size: 13px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
    }

    .detail-nav-btn:hover:not(:disabled) {
      border-color: var(--primary);
      color: var(--primary);
    }

    .detail-nav-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .detail-progress {
      font-size: 14px;
      font-weight: 500;
    }

    /* 图片预览弹窗 */
    .image-preview-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s;
    }

    .image-preview-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .image-preview-overlay img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 4px;
    }

    .preview-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255, 255, 255, 0.1);
      border: none;
      color: #fff;
      font-size: 32px;
      padding: 16px;
      cursor: pointer;
      border-radius: var(--radius);
    }

    .preview-nav:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .preview-prev { left: 20px; }
    .preview-next { right: 20px; }

    .preview-close {
      position: absolute;
      top: 20px;
      right: 20px;
      background: none;
      border: none;
      color: #fff;
      font-size: 28px;
      cursor: pointer;
    }

    .preview-counter {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      font-size: 14px;
    }

    /* 任务保存提示 - 绿色版本 */
    .task-toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 24px;
      background: var(--success);
      color: #fff;
      font-size: 13px;
      border-radius: var(--radius);
      box-shadow: 0 4px 12px rgba(46, 204, 113, 0.3);
      z-index: 3000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s;
    }

    .task-toast.show {
      opacity: 1;
      visibility: visible;
    }

    /* 任务保存提示 - 红色/警告版本 */
    .task-toast.error {
      background: var(--danger);
      box-shadow: 0 4px 12px rgba(231, 76, 60, 0.3);
    }
  </style>
</head>
<body>
  <!-- 任务保存提示 -->
  <div class="task-toast" id="taskToast">任务进度已保存</div>

  <div class="annotation-page">
    <!-- 页面标题 -->
    <div class="page-header">
      <div class="page-title">✏️ 标注任务</div>
      <span class="text-sm text-secondary" id="pageUpdateTime">数据更新时间：加载中...</span>
    </div>

    <!-- 筛选栏 -->
    <div class="filter-bar">
      <div class="filter-item">
        <label>AI审核结果：</label>
        <select class="form-select" id="filterAiResult">
          <option value="">全部</option>
          <option value="合规">合规</option>
          <option value="违规">违规</option>
        </select>
      </div>
      <div class="filter-item">
        <label>标注状态：</label>
        <select class="form-select" id="filterAnnotateStatus" onchange="handleFilterChange()">
          <option value="">全部</option>
          <option value="pending">待标注</option>
          <option value="correct">正确</option>
          <option value="error">错误</option>
          <option value="ignore">忽略</option>
        </select>
      </div>
      <div class="filter-item">
        <label>标注规则：</label>
        <select class="form-select" id="filterRule" onchange="handleFilterChange()">
          <option value="">全部</option>
        </select>
      </div>
      <div class="filter-item">
        <label>标注备注：</label>
        <select class="form-select" id="filterAnnotateNote">
          <option value="">全部</option>
        </select>
      </div>
      <div class="filter-item">
        <label>实例：</label>
        <select class="form-select" id="filterInstance">
          <option value="">全部</option>
        </select>
      </div>
      <div class="filter-item">
        <label>类目：</label>
        <select class="form-select" id="filterCategory">
          <option value="">全部</option>
        </select>
      </div>
      <div class="filter-item">
        <label>商品ID：</label>
        <input type="text" class="form-input" id="searchProductId" placeholder="请输入商品ID">
        <button class="btn btn-primary btn-sm" onclick="handleSearch()">查询</button>
        <button class="btn btn-default btn-sm" onclick="clearSearch()">清除</button>
      </div>
    </div>

    <!-- 统计摘要栏 -->
    <div class="stats-summary">
      <div class="stats-group">
        <div class="stats-item">
          <span class="num">标注总数</span>：
          <span class="label num" id="statAnnotationTotal">-</span>
        </div>
        <span class="divider">|</span>
        <div class="stats-item">
          <span class="label">待标注</span>：
          <span class="num" id="statPending">-</span>
        </div>
        <span class="divider">|</span>
        <div class="stats-item">
          <span class="label">已标注</span>：
          <span class="num" id="statAnnotated">-</span>
        </div>
        <span class="divider">|</span>
        <div class="stats-item">
          <span class="label">正确</span>：
          <span class="num" id="statCorrect">-</span>
        </div>
        <span class="divider">|</span>
        <div class="stats-item">
          <span class="label">错误</span>：
          <span class="num" id="statError">-</span>
        </div>
        <span class="divider">|</span>
        <div class="stats-item">
          <span class="label">忽略</span>：
          <span class="num" id="statIgnore">-</span>
        </div>
      </div>
      <button class="btn btn-default" onclick="exportAnnotation()">导出标注</button>
    </div>

    <!-- 批量操作按钮 -->
    <div class="batch-actions">
      <button class="batch-btn secondary" onclick="batchSave()">💾 全部保存</button>
      <button class="batch-btn primary" onclick="batchSubmit()">✅ 全部提交</button>
    </div>

    <!-- 数据表格 -->
    <table class="annotation-table" id="annotationTable">
      <thead>
        <tr>
          <th>审核id</th>
          <th>商品id</th>
          <th>商品名称</th>
          <th>类目</th>
          <th>实例</th>
          <th>规则类型</th>
          <th>模型A结果</th>
          <th>模型B结果</th>
          <th>标注状态</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="tableBody">
      </tbody>
    </table>

    <!-- 分页器 -->
    <div class="pagination" id="pagination">
      <div class="pagination-left">
        <label>每页显示</label>
        <select class="form-select" id="pageSizeSelect" onchange="changePageSize()">
          <option value="10">10</option>
          <option value="20" selected>20</option>
          <option value="50">50</option>
          <option value="100">100</option>
        </select>
      </div>
      <div class="pagination-center" id="paginationCenter"></div>
      <div class="pagination-right" id="paginationRight"></div>
    </div>
  </div>

  <!-- 标注详情弹窗 -->
  <div class="detail-modal-overlay" id="detailModal">
    <div class="detail-modal">
      <div class="detail-modal-header">
        <span class="detail-modal-title">标注详情</span>
        <button class="detail-modal-close" onclick="closeDetailModal()">&times;</button>
      </div>
      <div class="detail-modal-body">
        <!-- 左侧商品信息 -->
        <div class="product-info">
          <div class="product-title" id="modalProductTitle">商品名称</div>
          <div class="product-meta">
            <div class="product-meta-item">类目：<span class="value" id="modalCategory">-</span></div>
            <div class="product-meta-item">店铺：<span class="value" id="modalShop">-</span></div>
            <div class="product-meta-item">商品ID：<span class="value" id="modalProductId">-</span></div>
            <div class="product-meta-item"><a href="#" target="_blank" id="modalProductLink">商品链接</a></div>
          </div>
          <div class="image-compact" id="imageGrid">
          </div>
        </div>
        <!-- 右侧审核区 -->
        <div class="review-panel">
          <div class="review-card">
            <div class="review-card-title">模型A审核结果</div>
            <div class="review-item">
              <span class="label">AI审核结果：</span>
              <span class="value" id="modalAiResult">-</span>
            </div>
            <div class="review-item">
              <span class="label">AI拒绝原因：</span>
              <span class="value" id="modalAiRejectReason">-</span>
            </div>
          </div>
          <div class="review-card">
            <div class="collapse-toggle" onclick="toggleCollapse(this)">
              <span>模型B审核结果</span>
              <span>▼</span>
            </div>
            <div class="collapse-content" id="modelBContent">
              <div class="review-item">
                <span class="label">模型B结果：</span>
                <span class="value" id="modalModelBResult">-</span>
              </div>
              <div class="review-item">
                <span class="label">模型B拒绝原因：</span>
                <span class="value" id="modalModelBRejectReason">-</span>
              </div>
            </div>
          </div>
          <div class="annotation-actions">
            <div class="annotation-buttons">
              <button class="annotation-btn correct" id="btnCorrect" onclick="selectAnnotation('correct')">✓ 正确</button>
              <button class="annotation-btn error" id="btnError" onclick="selectAnnotation('error')">✗ 错误</button>
              <button class="annotation-btn ignore" id="btnIgnore" onclick="selectAnnotation('ignore')">⊘ 忽略</button>
            </div>
            <div class="annotation-inputs" id="annotationInputs">
              <div class="form-group">
                <label>标注备注<span style="color:var(--danger)">*</span></label>
                <select id="inputNote">
                  <option value="">请选择</option>
                </select>
              </div>
              <div class="form-group">
                <label>补充说明</label>
                <input type="text" id="inputComment" placeholder="选填">
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="detail-modal-footer">
        <button class="back-to-list-btn" onclick="closeDetailModal()">返回列表</button>
        <button class="detail-nav-btn" id="prevBtn" onclick="prevRecord()">← 上一条</button>
        <span class="detail-progress" id="progressInfo">1 / 20</span>
        <button class="detail-nav-btn" id="nextBtn" onclick="nextRecord()">下一条 →</button>
      </div>
    </div>
  </div>

  <!-- 图片预览弹窗 -->
  <div class="image-preview-overlay" id="imagePreview">
    <button class="preview-close" onclick="closeImagePreview()">&times;</button>
    <button class="preview-nav preview-prev" onclick="prevImage()">‹</button>
    <img id="previewImg" src="" alt="">
    <button class="preview-nav preview-next" onclick="nextImage()">›</button>
    <span class="preview-counter" id="previewCounter">1 / 4</span>
  </div>

  <!-- 提交确认弹窗 -->
  <div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-dialog">
      <div class="confirm-title">确认提交</div>
      <div class="confirm-message">确认提交此任务？提交后将不可再修改标注。</div>
      <div class="confirm-buttons">
        <button class="btn btn-default" onclick="closeConfirm()">取消</button>
        <button class="btn btn-primary" onclick="confirmSubmit()">确定</button>
      </div>
    </div>
  </div>

  <script>
    // =====================================================================
    // 全局数据变量（来自 API）
    // =====================================================================
    let apiData = [];           // 原始任务数据
    let filteredData = [];      // 筛选后数据
    let labelsData = [];       // 错误原因标签列表
    let allRules = [];          // 规则列表（去重）
    let allInstances = [];      // 实例列表（去重）

    // 分页 / 弹窗状态
    let currentPage = 1;
    let pageSize = 20;
    let totalItems = 0;
    let currentIndex = 0;           // filteredData 中的索引
    let imageList = [];
    let currentImageIndex = 0;
    let selectedAnnotation = '';    // 'correct' | 'error' | 'ignore'
    let pendingSubmitIndex = null;
    let batchPendingIndexes = [];
    let isLoading = false;

    // =====================================================================
    // 工具函数
    // =====================================================================

    /** 将 API check_result 映射为前端中文标签 */
    function mapCheckResult(cr) {
      if (cr === 'correct') return '正确';
      if (cr === 'error')   return '错误';
      if (cr === 'ignore')  return '忽略';
      return '待标注';
    }

    /** 将 API check_result 映射为 CSS class */
    function getAnnotationClass(cr) {
      if (cr === 'correct') return 'tag-correct';
      if (cr === 'error')   return 'tag-error';
      if (cr === 'ignore')  return 'tag-ignore';
      return 'tag-pending';
    }

    /** 将 API modelb_result 映射为中文显示 */
    function mapModelBResult(r) {
      if (r === 'error') return '违规';
      if (r === 'correct') return '合规';
      return '-';
    }

    /** 更新统计摘要栏 */
    function updateStats() {
      const pending = filteredData.filter(t => !t.check_result);
      const annotated = filteredData.filter(t => t.check_result);
      document.getElementById('statAnnotationTotal').textContent = filteredData.length.toLocaleString();
      document.getElementById('statPending').textContent = pending.length.toLocaleString();
      document.getElementById('statAnnotated').textContent = annotated.length.toLocaleString();
      // 标注状态细分
      const correct = filteredData.filter(t => t.check_result === 'correct').length;
      const error   = filteredData.filter(t => t.check_result === 'error').length;
      const ignore  = filteredData.filter(t => t.check_result === 'ignore').length;
      document.getElementById('statCorrect').textContent = correct.toLocaleString();
      document.getElementById('statError').textContent   = error.toLocaleString();
      document.getElementById('statIgnore').textContent  = ignore.toLocaleString();
    }

    // =====================================================================
    // API 调用
    // =====================================================================

    /** 获取标注任务列表 */
    function fetchTasks(extraParams) {
      if (isLoading) return;
      isLoading = true;
      const params = Object.assign({
        page: currentPage,
        per_page: pageSize,
        rule_name: document.getElementById('filterRule').value,
        status: document.getElementById('filterAnnotateStatus').value,
        instance: document.getElementById('filterInstance').value,
      }, extraParams || {});
      const qs = Object.entries(params).filter(([,v]) => v !== '' && v !== null).map(([k,v]) => k + '=' + encodeURIComponent(v)).join('&');
      safeFetch('/api/annotation/my-tasks?' + qs, { credentials: 'same-origin' })
        .then(function(res) {
          if (!res || !res.success) {
            showToast('加载任务失败：' + (res && res.error) || '未知错误', true);
            return;
          }
          apiData = res.items || [];
          filteredData = [...apiData];
          totalItems = res.total || apiData.length;
          // 提取去重规则和实例
          extractFilterOptions();
          renderTable();
          updateStats();
          document.getElementById('pageUpdateTime').textContent =
            '数据更新时间：' + new Date().toLocaleString('zh-CN');
        })
        .catch(function(err) { showToast('网络错误：' + (err && err.message) || err, true); })
        .finally(function() { isLoading = false; });
    }

    /** 获取错误原因标签列表 */
    function fetchLabels() {
      safeFetch('/api/config/labels', { credentials: 'same-origin' })
        .then(function(res) {
          if (res && res.success) {
            labelsData = res.labels || [];
            populateLabelOptions();
            populateFilterOptions();
          }
        })
        .catch(function(err) { console.error('加载标签失败', err); });
    }

    /** 提交标注结果 */
    function submitAnnotation(rawDataId, result, errorTag, note) {
      return safeFetch('/api/annotation/submit', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'same-origin',
        body: JSON.stringify({ raw_data_id: rawDataId, result, error_tag: errorTag, note })
      });
    }

    // =====================================================================
    // 初始化
    // =====================================================================

    function init() {
      fetchTasks();
      fetchLabels();
    }

    // =====================================================================
    // 筛选下拉框初始化
    // =====================================================================

    /** 从 apiData 提取并填充规则、实例、类目下拉 */
    function extractFilterOptions() {
      // 规则
      const ruleSet = new Set();
      const instSet = new Set();
      const catSet  = new Set();
      apiData.forEach(t => {
        if (t.rule_name) ruleSet.add(t.rule_name);
        if (t.instance_code) instSet.add(t.instance_code);
        if (t.category) catSet.add(t.category);
      });
      allRules = [...ruleSet].sort();
      allInstances = [...instSet].sort();

      // 填充规则下拉
      const ruleSel = document.getElementById('filterRule');
      const curRule = ruleSel.value;
      ruleSel.innerHTML = '<option value="">全部</option>';
      allRules.forEach(r => { ruleSel.innerHTML += '<option value="' + r + '">' + r + '</option>'; });
      ruleSel.value = curRule;

      // 填充实例下拉
      const instSel = document.getElementById('filterInstance');
      const curInst = instSel.value;
      instSel.innerHTML = '<option value="">全部</option>';
      allInstances.forEach(i => {
        const name = window.APP_CONFIG ? window.APP_CONFIG.getInstanceName(i) : i;
        instSel.innerHTML += '<option value="' + i + '">' + name + '</option>';
      });
      instSel.value = curInst;

      // 填充类目下拉
      const catSel = document.getElementById('filterCategory');
      const curCat = catSel.value;
      catSel.innerHTML = '<option value="">全部</option>';
      [...catSet].sort().forEach(c => { catSel.innerHTML += '<option value="' + c + '">' + c + '</option>'; });
      catSel.value = curCat;
    }

    /** 填充标签下拉（弹窗内） */
    function populateLabelOptions() {
      const sel = document.getElementById('inputNote');
      sel.innerHTML = '<option value="">请选择</option>';
      labelsData.forEach(l => { sel.innerHTML += '<option value="' + l + '">' + l + '</option>'; });
    }

    /** 填充标注备注筛选项 */
    function populateFilterOptions() {
      const sel = document.getElementById('filterAnnotateNote');
      sel.innerHTML = '<option value="">全部</option>';
      labelsData.forEach(l => { sel.innerHTML += '<option value="' + l + '">' + l + '</option>'; });
    }

    // =====================================================================
    // 筛选
    // =====================================================================

    function handleFilterChange() {
      // 叠加 client-side 过滤（在 apiData 基础上逐步过滤）
      // rule_name / instance / status(pending/done) 由后端过滤，这里只叠加 client-side 条件
      filteredData = apiData.filter(t => {
        // 标注状态细分过滤（correct / error / ignore）
        const statusVal = document.getElementById('filterAnnotateStatus').value;
        if (statusVal === 'correct' && t.check_result !== 'correct') return false;
        if (statusVal === 'error'   && t.check_result !== 'error')   return false;
        if (statusVal === 'ignore'  && t.check_result !== 'ignore')  return false;
        // 搜索框过滤
        const kw = (document.getElementById('searchProductId').value || '').trim().toLowerCase();
        if (kw && !(t.product_name || '').toLowerCase().includes(kw) && !(t.product_id || '').toLowerCase().includes(kw)) return false;
        // AI审核结果过滤
        const aiResult = document.getElementById('filterAiResult').value;
        if (aiResult && t.ai_result !== aiResult) return false;
        // 类目过滤
        const category = document.getElementById('filterCategory').value;
        if (category && t.category !== category) return false;
        return true;
      });
      totalItems = filteredData.length;
      currentPage = 1;
      renderTable();
      updateStats();
    }

    // =====================================================================
    // 渲染表格
    // =====================================================================

    function renderTable() {
      const start = (currentPage - 1) * pageSize;
      const end = start + pageSize;
      const pageData = filteredData.slice(start, end);
      const tbody = document.getElementById('tableBody');

      if (pageData.length === 0) {
        tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;padding:32px;color:var(--text-muted);">暂无任务</td></tr>';
        renderPagination();
        return;
      }

      let html = '';
      pageData.forEach((item, idx) => {
        const realIndex = start + idx;
        const annText  = mapCheckResult(item.check_result);
        const annClass = getAnnotationClass(item.check_result);
        const aiRes    = item.ai_result || '-';
        const modelBRes = mapModelBResult(item.modelb_result);
        const instName = window.APP_CONFIG ? window.APP_CONFIG.getInstanceName(item.instance_code) : (item.instance_code || '-');
        const btnText  = item.check_result ? '查看' : '标注';
        const btnClass = item.check_result ? 'btn-default' : 'btn-primary';

        html += '<tr>' +
          '<td>' + (item.id || '-') + '</td>' +
          '<td>' + (item.product_id || '-') + '</td>' +
          '<td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="' + (item.product_name || '') + '">' + (item.product_name || '-') + '</td>' +
          '<td>' + (item.category || '-') + '</td>' +
          '<td>' + instName + '</td>' +
          '<td><span class="tag-rule">' + (item.rule_name || '-') + '</span></td>' +
          '<td>' + aiRes + '</td>' +
          '<td>' + modelBRes + '</td>' +
          '<td><span class="' + annClass + '">' + annText + '</span></td>' +
          '<td><button class="btn btn-sm ' + btnClass + '" onclick="openDetailModal(' + realIndex + ')">' + btnText + '</button></td>' +
          '</tr>';
      });
      tbody.innerHTML = html;
      renderPagination();
    }

    function renderPagination() {
      const totalPages = Math.max(1, Math.ceil(totalItems / pageSize));
      const center = document.getElementById('paginationCenter');
      const right  = document.getElementById('paginationRight');

      right.textContent = '共 ' + totalItems.toLocaleString() + ' 条';

      let pages = [];
      if (totalPages <= 7) {
        for (let i = 1; i <= totalPages; i++) pages.push(i);
      } else {
        pages = [1, 2, 3, '...', totalPages - 2, totalPages - 1, totalPages];
      }

      let html = '';
      html += '<div class="pagination-item' + (currentPage === 1 ? ' disabled' : '') + '" onclick="goToPage(' + (currentPage - 1) + ')">← 上一页</div>';
      pages.forEach(p => {
        if (p === '...') {
          html += '<span class="pagination-ellipsis">...</span>';
        } else {
          html += '<div class="pagination-item' + (p === currentPage ? ' active' : '') + '" onclick="goToPage(' + p + ')">' + p + '</div>';
        }
      });
      html += '<div class="pagination-item' + (currentPage === totalPages ? ' disabled' : '') + '" onclick="goToPage(' + (currentPage + 1) + ')">下一页 →</div>';
      center.innerHTML = html;
    }

    function goToPage(page) {
      const totalPages = Math.max(1, Math.ceil(totalItems / pageSize));
      if (page < 1 || page > totalPages) return;
      currentPage = page;
      renderTable();
    }

    function changePageSize() {
      pageSize = parseInt(document.getElementById('pageSizeSelect').value);
      currentPage = 1;
      renderTable();
    }

    // =====================================================================
    // 弹窗
    // =====================================================================

    function openDetailModal(index) {
      currentIndex = index;
      const item = filteredData[index];
      if (!item) return;

      document.getElementById('modalProductTitle').textContent = item.product_name || '-';
      document.getElementById('modalCategory').textContent = item.category || '-';
      document.getElementById('modalShop').textContent = item.instance_code ? (window.APP_CONFIG ? window.APP_CONFIG.getInstanceName(item.instance_code) : item.instance_code) : '-';
      document.getElementById('modalProductId').textContent = item.product_id || '-';
      document.getElementById('modalProductLink').href = '#';

      const aiRes = item.ai_result || '-';
      document.getElementById('modalAiResult').textContent = aiRes;
      document.getElementById('modalAiResult').className = 'value';
      document.getElementById('modalAiRejectReason').textContent = item.ai_reject_reason || '-';

      const modelBRes = mapModelBResult(item.modelb_result);
      document.getElementById('modalModelBResult').textContent = modelBRes;
      document.getElementById('modalModelBRejectReason').textContent = item.modelb_reason || '-';

      // 恢复标注状态
      selectedAnnotation = item.check_result || '';
      updateAnnotationUI();
      updateImageGrid(item);
      updateProgress();

      document.getElementById('detailModal').classList.add('active');
    }

    function closeDetailModal() {
      document.getElementById('detailModal').classList.remove('active');
      // 刷新列表
      fetchTasks();
    }

    function updateImageGrid(item) {
      const grid = document.getElementById('imageGrid');
      imageList = [];
      let html = '';

      function addSection(label, url) {
        if (!url) return;
        imageList.push(url);
        html += '<div class="thumbnail-row"><div class="thumbnail-label">' + label + '</div><div class="thumbnail-wrapper">' +
          '<img class="thumbnail-img" src="' + url + '" onclick="openImagePreview(' + (imageList.length - 1) + ')">' +
          '</div></div>';
      }

      addSection('主图', item.main_image);
      addSection('详情图', item.detail_image);
      addSection('SKU图', item.sku_image);

      if (imageList.length === 0) {
        html = '<div style="padding:40px;text-align:center;color:var(--text-muted);">暂无图片</div>';
      }
      grid.innerHTML = html;
    }

    function updateAnnotationUI() {
      document.querySelectorAll('.annotation-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('annotationInputs').classList.remove('show');

      if (selectedAnnotation === 'correct') {
        document.getElementById('btnCorrect').classList.add('active');
      } else if (selectedAnnotation === 'error') {
        document.getElementById('btnError').classList.add('active');
        document.getElementById('annotationInputs').classList.add('show');
        // 回填已有标签
        const curItem = filteredData[currentIndex];
        if (curItem && curItem.annotation) {
          document.getElementById('inputNote').value = curItem.annotation;
        }
      } else if (selectedAnnotation === 'ignore') {
        document.getElementById('btnIgnore').classList.add('active');
      }
    }

    // =====================================================================
    // 标注操作
    // =====================================================================

    function selectAnnotation(type) {
      selectedAnnotation = type;
      document.querySelectorAll('.annotation-btn').forEach(b => b.classList.remove('active'));

      if (type === 'correct') {
        document.getElementById('btnCorrect').classList.add('active');
        document.getElementById('annotationInputs').classList.remove('show');
        saveAndNavigateNext();

      } else if (type === 'error') {
        document.getElementById('btnError').classList.add('active');
        document.getElementById('annotationInputs').classList.add('show');
        // 不自动提交，等用户选标签再点"下一条"

      } else if (type === 'ignore') {
        document.getElementById('btnIgnore').classList.add('active');
        document.getElementById('annotationInputs').classList.remove('show');
        saveAndNavigateNext();
      }
    }

    /** 正确/忽略自动提交并跳下一条 */
    function saveAndNavigateNext() {
      const item = filteredData[currentIndex];
      const result = selectedAnnotation;
      submitAnnotation(item.id, result, '', '')
        .then(function(res) {
          if (!res) { showTaskToast('提交失败，请重新登录', true); return; }
          if (res.success) {
            // 更新本地数据
            item.check_result = result;
            showTaskToast('标注已保存');
            renderTable();
            updateStats();
            // 跳下一条
            if (currentIndex < filteredData.length - 1) {
              currentIndex++;
              openDetailModal(currentIndex);
            } else {
              updateProgress();
              showTaskToast('全部完成，太棒了！');
              setTimeout(closeDetailModal, 1500);
            }
          } else {
            showToast(res.error || '提交失败', true);
          }
        })
        .catch(err => showToast('网络错误', true));
    }

    /** 错误选标签后提交并跳下一条 */
    function saveCurrentAndNavigateNext() {
      if (selectedAnnotation === 'error') {
        const note = document.getElementById('inputNote').value;
        if (!note) {
          showToastErr('请先选择错误标签');
          return;
        }
      }
      const item = filteredData[currentIndex];
      const errorTag = selectedAnnotation === 'error' ? document.getElementById('inputNote').value : '';
      const note     = selectedAnnotation === 'error' ? document.getElementById('inputComment').value : '';

      submitAnnotation(item.id, selectedAnnotation, errorTag, note)
        .then(function(res) {
          if (!res) { showTaskToast('提交失败，请重新登录', true); return; }
          if (res.success) {
            item.check_result = selectedAnnotation;
            showTaskToast('标注已保存');
            renderTable();
            updateStats();
            if (currentIndex < filteredData.length - 1) {
              currentIndex++;
              openDetailModal(currentIndex);
            } else {
              updateProgress();
              showTaskToast('全部完成，太棒了！');
              setTimeout(closeDetailModal, 1500);
            }
          } else {
            showToast(res.error || '提交失败', true);
          }
        })
        .catch(err => showToast('网络错误', true));
    }

    // 列表页操作（兼容 AC-12）
    function quickSave(index, btn) {
      const item = filteredData[index];
      if (!item.check_result) {
        showToast('请先选择标注结果', true);
        return;
      }
      renderTable();
      showTaskToast();
      const row = btn.closest('tr');
      if (row) { row.classList.add('row-flash'); setTimeout(() => row.classList.remove('row-flash'), 1000); }
    }

    function quickSubmit(index) {
      const item = filteredData[index];
      if (!item.check_result) {
        showToast('请先选择标注结果', true);
        return;
      }
      pendingSubmitIndex = index;
      document.querySelector('#confirmOverlay .confirm-message').textContent = '确认提交此任务？提交后将不可再修改标注。';
      document.getElementById('confirmOverlay').classList.add('active');
    }

    // =====================================================================
    // 批量操作
    // =====================================================================

    // 批量操作逻辑重构：不再有"保存"操作，提交直接落库
    function batchSave() {
      showToast('已标注任务已自动保存，无需手动保存', false);
    }

    function batchSubmit() {
      const pageData = filteredData.slice((currentPage - 1) * pageSize, currentPage * pageSize);
      const pending = pageData.filter(t => !t.check_result);
      if (pending.length > 0) {
        showToast('有 ' + pending.length + ' 条待标注数据，请先完成标注', true);
        return;
      }
      batchPendingIndexes = pageData.map((t, i) => (currentPage - 1) * pageSize + i);
      document.querySelector('#confirmOverlay .confirm-message').textContent =
        '确认提交当前页面全部 ' + batchPendingIndexes.length + ' 条标注结果？提交后将不可再修改。';
      document.getElementById('confirmOverlay').classList.add('active');
    }

    function batchConfirmSubmit() {
      if (!batchPendingIndexes || batchPendingIndexes.length === 0) return;
      let done = 0;
      batchPendingIndexes.forEach(idx => {
        const item = filteredData[idx];
        if (item && item.check_result) {
          submitAnnotation(item.id, item.check_result, item.annotation || '', '')
            .then(() => { done++; if (done === batchPendingIndexes.length) onBatchDone(done); })
            .catch(() => { done++; if (done === batchPendingIndexes.length) onBatchDone(done); });
        } else { done++; if (done === batchPendingIndexes.length) onBatchDone(done); }
      });
    }

    function onBatchDone(count) {
      renderTable();
      updateStats();
      closeConfirm();
      showTaskToast('已提交 ' + count + ' 条任务');
      batchPendingIndexes = [];
    }

    function confirmSubmit() {
      if (pendingSubmitIndex !== null) {
        const item = filteredData[pendingSubmitIndex];
        if (!item || !item.check_result) { showToast('请先选择标注结果', true); return; }
        submitAnnotation(item.id, item.check_result, item.annotation || '', '')
          .then(function(res) {
            if (!res) { showToast('提交失败，请重新登录', true); return; }
            if (res.success) { renderTable(); closeConfirm(); showTaskToast(); }
            else showToast(res.error || '提交失败', true);
          });
        pendingSubmitIndex = null;
      } else if (batchPendingIndexes && batchPendingIndexes.length > 0) {
        batchConfirmSubmit();
      }
    }

    function closeConfirm() {
      document.getElementById('confirmOverlay').classList.remove('active');
      pendingSubmitIndex = null;
    }

    // =====================================================================
    // 导航
    // =====================================================================

    function prevRecord() {
      if (currentIndex > 0) { currentIndex--; openDetailModal(currentIndex); }
    }

    function nextRecord() {
      if (selectedAnnotation === 'error') {
        saveCurrentAndNavigateNext();
      } else if (selectedAnnotation === 'correct' || selectedAnnotation === 'ignore') {
        saveAndNavigateNext();
      } else {
        if (currentIndex < filteredData.length - 1) { currentIndex++; openDetailModal(currentIndex); }
      }
    }

    function updateProgress() {
      document.getElementById('progressInfo').textContent = (currentIndex + 1) + ' / ' + filteredData.length;
      document.getElementById('prevBtn').disabled = currentIndex === 0;
      document.getElementById('nextBtn').disabled = currentIndex === filteredData.length - 1;
    }

    // =====================================================================
    // 图片预览
    // =====================================================================

    function openImagePreview(idx) {
      currentImageIndex = idx;
      showPreviewImage();
      document.getElementById('imagePreview').classList.add('active');
    }

    function closeImagePreview() {
      document.getElementById('imagePreview').classList.remove('active');
    }

    function showPreviewImage() {
      document.getElementById('previewImg').src = imageList[currentImageIndex] || '';
      document.getElementById('previewCounter').textContent = (currentImageIndex + 1) + ' / ' + imageList.length;
    }

    function prevImage() {
      if (currentImageIndex > 0) { currentImageIndex--; showPreviewImage(); }
    }

    function nextImage() {
      if (currentImageIndex < imageList.length - 1) { currentImageIndex++; showPreviewImage(); }
    }

    // =====================================================================
    // 辅助函数
    // =====================================================================

    function toggleCollapse(btn) {
      btn.nextElementSibling.classList.toggle('show');
    }

    function showTaskToast(msg) {
      const toast = document.getElementById('taskToast');
      toast.textContent = msg || '任务进度已保存';
      toast.classList.remove('error');
      toast.style.background = 'var(--success)';
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function showToast(msg, isError) {
      const toast = document.getElementById('taskToast');
      toast.textContent = msg;
      toast.classList.toggle('error', !!isError);
      toast.style.background = isError ? 'var(--danger)' : 'var(--success)';
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function showToastErr(msg) { showToast(msg, true); }

    function handleSearch() { handleFilterChange(); }

    function clearSearch() {
      document.getElementById('searchProductId').value = '';
      document.getElementById('filterAiResult').value = '';
      document.getElementById('filterAnnotateStatus').value = '';
      document.getElementById('filterRule').value = '';
      document.getElementById('filterAnnotateNote').value = '';
      document.getElementById('filterCategory').value = '';
      document.getElementById('filterInstance').value = '';
      filteredData = [...apiData];
      totalItems = filteredData.length;
      currentPage = 1;
      renderTable();
      updateStats();
    }

    function exportAnnotation() { showToast('导出功能开发中', false); }

    // =====================================================================
    // 快捷键
    // =====================================================================

    document.addEventListener('keydown', function(e) {
      if (!document.getElementById('detailModal').classList.contains('active')) return;
      if (e.key === 'Escape') closeDetailModal();
      if (e.key === 'ArrowLeft') prevRecord();
      if (e.key === 'ArrowRight') nextRecord();
    });

    document.addEventListener('keydown', function(e) {
      if (!document.getElementById('imagePreview').classList.contains('active')) return;
      if (e.key === 'Escape') closeImagePreview();
      if (e.key === 'ArrowLeft') prevImage();
      if (e.key === 'ArrowRight') nextImage();
    });

    // =====================================================================
    // 启动
    // =====================================================================

    init();
  </script>
</body>
</html>
