<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>系统配置</title>
  <link rel="stylesheet" href="/static/common.css">
  <script src="/static/config.js"></script>
  <style>
    .settings-page {
      padding: 20px 24px;
    }

    .page-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .page-subtitle {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 20px;
    }

    .config-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 20px;
      margin-bottom: 20px;
    }

    .config-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-light);
    }

    .config-card-title {
      font-size: 15px;
      font-weight: 600;
    }

    .config-desc {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 16px;
      line-height: 1.6;
    }

    .settings-link-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .settings-link-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      background: var(--bg);
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.2s;
    }

    .settings-link-item:hover {
      background: var(--primary-light);
    }

    .settings-link-item .link-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .settings-link-item .link-icon {
      font-size: 20px;
    }

    .settings-link-item .link-text {
      font-size: 14px;
      font-weight: 500;
    }

    .settings-link-item .link-arrow {
      color: var(--text-muted);
      font-size: 14px;
    }

    /* Cookie 配置卡片 - 唯一保留在settings.html的配置 */
    .cookie-card {
      margin-top: 24px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 6px;
      color: var(--text-primary);
    }

    .form-input {
      width: 100%;
      padding: 8px 12px;
      font-size: 13px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--white);
      font-family: inherit;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79, 110, 247, 0.1);
    }

    .status-badge {
      font-size: 13px;
      margin-bottom: 12px;
    }

    .status-badge.success { color: var(--success); }
    .status-badge.warning { color: var(--warning); }
    .status-badge.muted { color: var(--text-muted); }

    .hint {
      font-size: 12px;
      color: var(--success);
      margin-bottom: 4px;
    }

    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 24px;
      background: var(--success);
      color: #fff;
      font-size: 13px;
      border-radius: var(--radius);
      box-shadow: 0 4px 12px rgba(46, 204, 113, 0.3);
      z-index: 2000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s;
    }

    .toast.show { opacity: 1; visibility: visible; }
    .toast.error { background: var(--danger); box-shadow: 0 4px 12px rgba(231, 76, 60, 0.3); }
  </style>
</head>
<body>
  <div class="settings-page">
    <div class="page-title">⚙️ 系统配置</div>
    <div class="page-subtitle">
      已将配置功能拆分至"系统配置"菜单下的各子页面，请通过左侧导航栏访问<br>
      <span style="color: var(--text-muted);">点击下方链接快速跳转：</span>
    </div>

    <div class="toast" id="toast"></div>

    <!-- 快捷链接列表 -->
    <div class="settings-link-list">
      <div class="settings-link-item" onclick="parent.navigateTo('sql_config.html')">
        <div class="link-left">
          <span class="link-icon">&#128295;</span>
          <span class="link-text">数据源配置</span>
        </div>
        <span class="link-arrow">&#9656;</span>
      </div>

      <div class="settings-link-item" onclick="parent.navigateTo('rule_config.html')">
        <div class="link-left">
          <span class="link-icon">&#128203;</span>
          <span class="link-text">审核规则与实例</span>
        </div>
        <span class="link-arrow">&#9656;</span>
      </div>

      <div class="settings-link-item" onclick="parent.navigateTo('modelb_config.html')">
        <div class="link-left">
          <span class="link-icon">&#129302;</span>
          <span class="link-text">模型B配置</span>
        </div>
        <span class="link-arrow">&#9656;</span>
      </div>

      <div class="settings-link-item" onclick="parent.navigateTo('label_config.html')">
        <div class="link-left">
          <span class="link-icon">&#127991;</span>
          <span class="link-text">标注标签配置</span>
        </div>
        <span class="link-arrow">&#9656;</span>
      </div>

      <div class="settings-link-item" onclick="parent.navigateTo('account_management.html')">
        <div class="link-left">
          <span class="link-icon">&#128101;</span>
          <span class="link-text">账号管理</span>
        </div>
        <span class="link-arrow">&#9656;</span>
      </div>
    </div>

    <!-- Cookie 配置（唯一保留在此页面的配置） -->
    <div class="config-card cookie-card">
      <div class="config-card-header">
        <span class="config-card-title">🔑 Cookie 配置</span>
      </div>
      <div class="config-desc">
        配置 iData 平台认证 Cookie，用于数据拉取。Cookie 优先从数据库读取，数据库无配置时使用配置文件中的默认值。
      </div>

      <div style="margin-bottom: 16px;">
        <div class="status-badge" id="cookieStatus">加载中...</div>
      </div>

      <div style="margin-bottom: 16px;">
        <label style="display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px;">Cookie 字符串</label>
        <div class="hint" id="cookieHint" style="display: none;">
          已配置（上次更新：<span id="cookieUpdatedAt"></span>），留空则保留原值
        </div>
        <input type="password" class="form-input" id="cookieInput" placeholder="粘贴完整的 Cookie 字符串">
      </div>

      <div style="display: flex; gap: 8px;">
        <button class="btn btn-default" onclick="testCookie()">测试连接</button>
        <button class="btn btn-primary" onclick="saveCookie()">保存 Cookie</button>
      </div>
    </div>
  </div>

  <script>
    var cookieIsConfigured = false;

    function loadCookieStatus() {
      fetch('/api/config/IDATA_COOKIE')
        .then(function(r) { return r.json(); })
        .then(function(data) {
          var statusEl = document.getElementById('cookieStatus');
          var hintEl = document.getElementById('cookieHint');
          var updatedAtEl = document.getElementById('cookieUpdatedAt');
          var inputEl = document.getElementById('cookieInput');

          cookieIsConfigured = data.is_configured;

          if (data.is_configured) {
            statusEl.textContent = '✓ 已配置（上次更新：' + (data.updated_at || '未知') + '）';
            statusEl.className = 'status-badge success';
            hintEl.style.display = 'block';
            if (updatedAtEl) updatedAtEl.textContent = data.updated_at || '未知';
            inputEl.placeholder = '已配置（***），输入新值覆盖';
          } else {
            statusEl.textContent = '⚠ 未配置';
            statusEl.className = 'status-badge warning';
            hintEl.style.display = 'none';
            inputEl.placeholder = '粘贴完整的 Cookie 字符串';
          }
        })
        .catch(function() {
          document.getElementById('cookieStatus').textContent = '加载失败';
          document.getElementById('cookieStatus').className = 'status-badge muted';
        });
    }

    function doSaveCookie(cookieValue) {
      fetch('/api/config/IDATA_COOKIE', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ value: cookieValue })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.success) {
          showToast(data.message || 'Cookie 已更新');
          loadCookieStatus();
          document.getElementById('cookieInput').value = '';
        } else {
          showToast(data.message || '保存失败', true);
        }
      })
      .catch(function(error) {
        showToast('保存失败: ' + error.message, true);
      });
    }

    function saveCookie() {
      var cookie = document.getElementById('cookieInput').value.trim();
      if (!cookie) {
        if (cookieIsConfigured) {
          if (!confirm('确认清空 Cookie？清空后数据拉取将无法使用。')) return;
          doSaveCookie('');
        } else {
          showToast('请输入 Cookie', true);
        }
        return;
      }
      doSaveCookie(cookie);
    }

    function testCookie() {
      var cookie = document.getElementById('cookieInput').value.trim();
      if (!cookie) {
        showToast('请输入 Cookie 进行测试', true);
        return;
      }
      showToast('正在测试连接...');
      fetch('/api/config/test-connection', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ cookie: cookie })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.success) {
          showToast(data.message);
        } else {
          showToast(data.message || '连接失败', true);
        }
      })
      .catch(function(error) {
        showToast('测试失败: ' + error.message, true);
      });
    }

    function showToast(message, isError) {
      var toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast' + (isError ? ' error' : '') + ' show';
      setTimeout(function() { toast.classList.remove('show'); }, 3000);
    }

    // 父窗口导航函数
    if (parent && parent.navigateTo) {
      window.navigateTo = parent.navigateTo;
    }

    document.addEventListener('DOMContentLoaded', function() {
      loadCookieStatus();
    });
  </script>
</body>
</html>
