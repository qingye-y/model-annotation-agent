<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>账号管理 - 标注员账号管理</title>
  <link rel="stylesheet" href="/static/common.css">
  <script src="/static/config.js"></script>
  <style>
    .account-page {
      padding: 20px 24px;
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .page-title-wrap {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .page-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .page-subtitle {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .batch-actions {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }

    .batch-btn {
      padding: 8px 16px;
      font-size: 13px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.2s;
    }

    .batch-btn.primary {
      background: var(--primary);
      border: 1px solid var(--primary);
      color: #fff;
    }

    .batch-btn.primary:hover {
      background: var(--primary-hover);
    }

    .account-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .account-table thead th {
      background: #fafbfc;
      color: var(--text-secondary);
      font-weight: 500;
      text-align: left;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    .account-table tbody td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-light);
      color: var(--text-primary);
      vertical-align: middle;
    }

    .account-table tbody tr:hover {
      background: #f8f9ff;
    }

    .rule-tag {
      display: inline-block;
      background: #e0e7ff;
      color: #4f6ef7;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 11px;
      margin-right: 4px;
      margin-bottom: 2px;
    }

    .status-enabled {
      background: var(--success-light);
      color: var(--success);
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 12px;
    }

    .status-disabled {
      background: var(--danger-light);
      color: var(--danger);
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 12px;
    }

    .op-btn {
      padding: 4px 10px;
      font-size: 12px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.2s;
      margin-right: 4px;
      background: var(--white);
      border: 1px solid var(--border);
      color: var(--text-secondary);
    }

    .op-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .op-btn.danger {
      color: var(--danger);
      border-color: var(--danger);
    }

    .op-btn.danger:hover {
      background: var(--danger);
      color: #fff;
    }

    .op-btn.warning {
      color: var(--warning);
      border-color: var(--warning);
    }

    .op-btn.warning:hover {
      background: var(--warning);
      color: #fff;
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      width: 95%;
      max-width: 520px;
      transform: scale(0.95);
      transition: transform 0.3s;
    }

    .modal-overlay.active .modal {
      transform: scale(1);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-light);
    }

    .modal-title {
      font-size: 16px;
      font-weight: 600;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 24px;
      color: var(--text-muted);
      cursor: pointer;
      line-height: 1;
      padding: 4px 8px;
      border-radius: var(--radius);
    }

    .modal-close:hover {
      background: var(--border-light);
      color: var(--text-primary);
    }

    .modal-body {
      padding: 20px;
    }

    .modal-footer {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      padding: 16px 20px;
      border-top: 1px solid var(--border-light);
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 6px;
    }

    .form-group label .required {
      color: var(--danger);
      margin-left: 2px;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 8px 12px;
      font-size: 13px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--primary);
    }

    .form-group input::placeholder {
      color: var(--text-muted);
    }

    .multi-select-wrap {
      position: relative;
    }

    .multi-select-trigger {
      width: 100%;
      padding: 8px 12px;
      font-size: 13px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--white);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 38px;
    }

    .multi-select-trigger:hover {
      border-color: var(--primary);
    }

    .multi-select-trigger .arrow {
      font-size: 10px;
      color: var(--text-muted);
    }

    .multi-select-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      max-height: 200px;
      overflow-y: auto;
      z-index: 10;
      display: none;
    }

    .multi-select-dropdown.show {
      display: block;
    }

    .multi-select-option {
      padding: 8px 12px;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .multi-select-option:hover {
      background: var(--primary-light);
    }

    .multi-select-option input[type="checkbox"] {
      width: auto;
    }

    .password-group {
      display: flex;
      gap: 8px;
    }

    .password-group input {
      flex: 1;
    }

    .password-toggle {
      padding: 8px 12px;
      font-size: 13px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      white-space: nowrap;
      color: var(--text-secondary);
    }

    .password-toggle:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .confirm-dialog {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 24px;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }

    .confirm-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .confirm-message {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 20px;
    }

    .confirm-buttons {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }
  </style>
</head>
<body>
  <div class="account-page">
    <div class="page-header">
      <div class="page-title-wrap">
        <div class="page-title">👥 账号管理</div>
        <div class="page-subtitle">管理标注员登录账号与权限</div>
      </div>
    </div>

    <div class="batch-actions">
      <button class="batch-btn primary" onclick="openAddModal()">+ 添加标注员</button>
    </div>

    <table class="account-table">
      <thead>
        <tr>
          <th>账号名</th>
          <th>姓名</th>
          <th>绑定规则组</th>
          <th>每日额度</th>
          <th>已用/剩余</th>
          <th>状态</th>
          <th>创建时间</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="tableBody">
      </tbody>
    </table>
  </div>

  <!-- 添加/编辑弹窗 -->
  <div class="modal-overlay" id="accountModal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="modalTitle">添加标注员</span>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>账号名 <span class="required">*</span></label>
          <input type="text" id="inputUsername" placeholder="请输入账号名">
        </div>
        <div class="form-group">
          <label>初始密码 <span class="required">*</span></label>
          <div class="password-group">
            <input type="password" id="inputPassword" placeholder="请输入密码">
            <button type="button" class="password-toggle" onclick="generatePassword()">生成随机密码</button>
          </div>
        </div>
        <div class="form-group">
          <label>姓名 <span class="required">*</span></label>
          <input type="text" id="inputRealname" placeholder="请输入姓名">
        </div>
        <div class="form-group">
          <label>绑定规则组 <span class="required">*</span></label>
          <div class="multi-select-wrap">
            <div class="multi-select-trigger" id="ruleTrigger" onclick="toggleRuleDropdown()">
              <span id="ruleTriggerText">请选择规则组（可多选）</span>
              <span class="arrow">▼</span>
            </div>
            <div class="multi-select-dropdown" id="ruleDropdown">
            </div>
          </div>
        </div>
        <div class="form-group">
          <label>每日标注额度 <span class="required">*</span></label>
          <input type="number" id="inputQuota" value="200" placeholder="请输入每日标注额度">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-default" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" onclick="saveAccount()">保存</button>
      </div>
    </div>
  </div>

  <!-- 重置密码弹窗 -->
  <div class="modal-overlay" id="resetPwdModal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">重置密码</span>
        <button class="modal-close" onclick="closeResetPwdModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>新密码 <span class="required">*</span></label>
          <input type="password" id="newPassword" placeholder="请输入新密码">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-default" onclick="closeResetPwdModal()">取消</button>
        <button class="btn btn-primary" onclick="confirmResetPwd()">确认重置</button>
      </div>
    </div>
  </div>

  <!-- 删除确认弹窗 -->
  <div class="modal-overlay" id="deleteModal">
    <div class="confirm-dialog">
      <div class="confirm-title">确认删除</div>
      <div class="confirm-message" id="deleteMsg">确认删除该账号？</div>
      <div class="confirm-buttons">
        <button class="btn btn-default" onclick="closeDeleteModal()">取消</button>
        <button class="btn btn-danger" onclick="confirmDelete()">删除</button>
      </div>
    </div>
  </div>

  <!-- Toast 提示 -->
  <div class="task-toast" id="toast"></div>

  <script>
    let accounts = [];
    let editingUsername = null;
    let deleteUsername = null;
    let selectedRules = [];
    let selectedRuleIds = [];

    // 初始化
    function init() {
      loadAccounts();
      populateRuleOptions();
    }

    // 从全局配置加载账号
    function loadAccounts() {
      accounts = window.APP_CONFIG.getUsers();
      renderTable();
    }

    // 渲染表格
    function renderTable() {
      const tbody = document.getElementById('tableBody');
      let html = '';
      accounts.forEach(acc => {
        const statusClass = acc.status === 'active' ? 'status-enabled' : 'status-disabled';
        const statusText = acc.status === 'active' ? '启用' : '停用';
        const ruleNames = window.APP_CONFIG.getUserRuleNames(acc.username);
        const ruleTags = ruleNames.map(r => `<span class="rule-tag">${r}</span>`).join('');
        const remaining = acc.dailyQuota - acc.usedQuota;

        html += '<tr>' +
          '<td>' + acc.username + '</td>' +
          '<td>' + acc.name + '</td>' +
          '<td>' + ruleTags + '</td>' +
          '<td>' + acc.dailyQuota + '</td>' +
          '<td>' + acc.usedQuota + '/' + remaining + '</td>' +
          '<td><span class="' + statusClass + '">' + statusText + '</span></td>' +
          '<td>' + acc.createdAt + '</td>' +
          '<td>' +
            '<button class="op-btn" onclick="openEditModal(\'' + acc.username + '\')">编辑</button>' +
            '<button class="op-btn" onclick="openResetPwdModal(\'' + acc.username + '\')">重置密码</button>' +
            '<button class="op-btn" onclick="toggleStatus(\'' + acc.username + '\')">' + (acc.status === 'active' ? '停用' : '启用') + '</button>' +
            '<button class="op-btn danger" onclick="openDeleteModal(\'' + acc.username + '\')">删除</button>' +
          '</td>' +
          '</tr>';
      });
      tbody.innerHTML = html;
    }

    // 填充规则选项
    function populateRuleOptions() {
      const dropdown = document.getElementById('ruleDropdown');
      const rules = window.APP_CONFIG.getPromptRules();
      let html = '';
      rules.forEach(rule => {
        html += '<label class="multi-select-option">' +
          '<input type="checkbox" value="' + rule.id + '" data-name="' + rule.name + '" onchange="handleRuleChange(this)">' +
          rule.name +
          '</label>';
      });
      dropdown.innerHTML = html;
    }

    // 切换规则下拉
    function toggleRuleDropdown() {
      document.getElementById('ruleDropdown').classList.toggle('show');
    }

    // 规则选择变化
    function handleRuleChange(checkbox) {
      const ruleId = checkbox.value;
      const ruleName = checkbox.dataset.name;
      if (checkbox.checked) {
        selectedRuleIds.push(ruleId);
        selectedRules.push(ruleName);
      } else {
        selectedRuleIds = selectedRuleIds.filter(r => r !== ruleId);
        selectedRules = selectedRules.filter(r => r !== ruleName);
      }
      updateRuleTriggerText();
    }

    // 更新规则触发器文本
    function updateRuleTriggerText() {
      const text = document.getElementById('ruleTriggerText');
      if (selectedRules.length === 0) {
        text.textContent = '请选择规则组（可多选）';
      } else if (selectedRules.length <= 2) {
        text.textContent = selectedRules.join('、');
      } else {
        text.textContent = selectedRules.slice(0, 2).join('、') + ' 等' + selectedRules.length + '项';
      }
    }

    // 生成随机密码
    function generatePassword() {
      const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*';
      let password = '';
      for (let i = 0; i < 12; i++) {
        password += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      document.getElementById('inputPassword').value = password;
    }

    // 打开添加弹窗
    function openAddModal() {
      editingUsername = null;
      document.getElementById('modalTitle').textContent = '添加标注员';
      document.getElementById('inputUsername').value = '';
      document.getElementById('inputUsername').disabled = false;
      document.getElementById('inputPassword').value = '';
      document.getElementById('inputRealname').value = '';
      document.getElementById('inputQuota').value = '200';
      selectedRules = [];
      selectedRuleIds = [];
      updateRuleTriggerText();
      document.querySelectorAll('#ruleDropdown input[type="checkbox"]').forEach(cb => cb.checked = false);
      document.getElementById('accountModal').classList.add('active');
    }

    // 打开编辑弹窗
    function openEditModal(username) {
      const acc = accounts.find(a => a.username === username);
      if (!acc) return;

      editingUsername = username;
      document.getElementById('modalTitle').textContent = '编辑标注员';
      document.getElementById('inputUsername').value = acc.username;
      document.getElementById('inputUsername').disabled = true;
      document.getElementById('inputPassword').value = '********';
      document.getElementById('inputRealname').value = acc.name;
      document.getElementById('inputQuota').value = acc.dailyQuota;

      // 设置规则
      selectedRuleIds = [...acc.rules];
      selectedRules = window.APP_CONFIG.getUserRuleNames(username);
      updateRuleTriggerText();

      // 同步复选框状态
      document.querySelectorAll('#ruleDropdown input[type="checkbox"]').forEach(cb => {
        cb.checked = selectedRuleIds.includes(cb.value);
      });

      document.getElementById('accountModal').classList.add('active');
    }

    // 关闭弹窗
    function closeModal() {
      document.getElementById('accountModal').classList.remove('active');
      document.getElementById('ruleDropdown').classList.remove('show');
    }

    // 保存账号
    function saveAccount() {
      const username = document.getElementById('inputUsername').value.trim();
      const password = document.getElementById('inputPassword').value;
      const name = document.getElementById('inputRealname').value.trim();
      const dailyQuota = parseInt(document.getElementById('inputQuota').value) || 200;

      if (!username) {
        showToast('请输入账号名', true);
        return;
      }
      if (!password || password === '********') {
        showToast('请输入密码', true);
        return;
      }
      if (!name) {
        showToast('请输入姓名', true);
        return;
      }
      if (selectedRuleIds.length === 0) {
        showToast('请选择至少一个规则组', true);
        return;
      }

      if (editingUsername) {
        // 编辑 - 调用全局方法
        window.APP_CONFIG.updateUser(editingUsername, {
          name: name,
          rules: selectedRuleIds,
          dailyQuota: dailyQuota
        });
        showToast('账号已更新');
      } else {
        // 新增 - 调用全局方法
        const result = window.APP_CONFIG.addUser({
          username: username,
          password: password,
          name: name,
          rules: selectedRuleIds,
          dailyQuota: dailyQuota
        });
        if (!result.success) {
          showToast(result.message, true);
          return;
        }
        showToast('账号已添加');
      }

      loadAccounts();
      closeModal();
    }

    // 打开重置密码弹窗
    function openResetPwdModal(username) {
      deleteUsername = username;
      document.getElementById('newPassword').value = '';
      document.getElementById('resetPwdModal').classList.add('active');
    }

    // 关闭重置密码弹窗
    function closeResetPwdModal() {
      document.getElementById('resetPwdModal').classList.remove('active');
      deleteUsername = null;
    }

    // 确认重置密码
    function confirmResetPwd() {
      const newPwd = document.getElementById('newPassword').value;
      if (!newPwd) {
        showToast('请输入新密码', true);
        return;
      }
      window.APP_CONFIG.resetPassword(deleteUsername, newPwd);
      showToast('密码已重置');
      closeResetPwdModal();
    }

    // 切换状态
    function toggleStatus(username) {
      window.APP_CONFIG.toggleUserStatus(username);
      loadAccounts();
    }

    // 打开删除弹窗
    function openDeleteModal(username) {
      const acc = accounts.find(a => a.username === username);
      if (!acc) return;

      deleteUsername = username;
      document.getElementById('deleteMsg').textContent = '确认删除账号 ' + acc.username + '？';
      document.getElementById('deleteModal').classList.add('active');
    }

    // 关闭删除弹窗
    function closeDeleteModal() {
      document.getElementById('deleteModal').classList.remove('active');
      deleteUsername = null;
    }

    // 确认删除
    function confirmDelete() {
      if (deleteUsername) {
        window.APP_CONFIG.deleteUser(deleteUsername);
        loadAccounts();
        showToast('账号已删除');
        closeDeleteModal();
      }
    }

    // Toast 提示
    function showToast(msg, isError) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.style.background = isError ? 'var(--danger)' : 'var(--success)';
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }

    // 点击其他地方关闭下拉
    document.addEventListener('click', function(e) {
      if (!e.target.closest('.multi-select-wrap')) {
        document.getElementById('ruleDropdown').classList.remove('show');
      }
    });

    // 初始化
    init();
  </script>
</body>
</html>
