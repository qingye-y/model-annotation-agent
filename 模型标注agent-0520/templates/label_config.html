<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>标注标签配置</title>
  <link rel="stylesheet" href="/static/common.css">
  <script src="/static/config.js"></script>
  <style>
    .page-container {
      padding: 20px 24px;
      max-width: 900px;
    }

    .page-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .page-subtitle {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 20px;
    }

    .config-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 20px;
      margin-bottom: 20px;
    }

    .config-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-light);
    }

    .config-card-title {
      font-size: 15px;
      font-weight: 600;
    }

    .config-desc {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 16px;
      line-height: 1.6;
    }

    .add-tag-form {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .add-tag-form .form-input {
      flex: 1;
      max-width: 300px;
      padding: 6px 10px;
      font-size: 13px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--white);
      font-family: inherit;
    }

    .add-tag-form .form-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79, 110, 247, 0.1);
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      background: var(--primary-light);
      color: var(--primary);
      border-radius: var(--radius);
      font-size: 13px;
    }

    .tag-item .tag-actions {
      display: flex;
      gap: 4px;
      margin-left: 4px;
    }

    .tag-item .tag-btn {
      background: none;
      border: none;
      color: var(--primary);
      cursor: pointer;
      padding: 2px;
      font-size: 12px;
      opacity: 0.7;
      transition: opacity 0.2s;
    }

    .tag-item .tag-btn:hover {
      opacity: 1;
    }

    .tag-item .tag-btn.delete {
      color: var(--danger);
    }

    .config-footer {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid var(--border-light);
      font-size: 12px;
      color: var(--text-muted);
    }

    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 24px;
      background: var(--success);
      color: #fff;
      font-size: 13px;
      border-radius: var(--radius);
      box-shadow: 0 4px 12px rgba(46, 204, 113, 0.3);
      z-index: 2000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s;
    }

    .toast.show {
      opacity: 1;
      visibility: visible;
    }

    .toast.error {
      background: var(--danger);
      box-shadow: 0 4px 12px rgba(231, 76, 60, 0.3);
    }

    .text-muted { color: var(--text-muted); }
  </style>
</head>
<body>
  <div class="page-container">
    <div class="page-title">&#127991; 标注标签配置</div>
    <div class="page-subtitle">管理标注备注标签与 Badcase 分类标签</div>

    <div class="toast" id="toast"></div>

    <div class="config-card">
      <div class="config-card-header">
        <span class="config-card-title">标注备注标签</span>
        <button class="btn btn-sm btn-default" onclick="resetToDefault()">重置为默认</button>
      </div>
      <div class="config-desc">
        此处配置的标签将同步应用于标注任务中的"标注备注"下拉选项，以及 Badcase 管理中的错误分类筛选。
      </div>

      <div class="add-tag-form">
        <input type="text" class="form-input" id="newTagInput" placeholder="请输入新标签名称">
        <button class="btn btn-primary" onclick="addTag()">添加标签</button>
      </div>

      <div class="tag-list" id="tagList"></div>

      <div class="config-footer">
        配置自动保存至本地，所有引用该标签的页面将同步更新。
      </div>
    </div>
  </div>

  <script>
    function renderTags() {
      var labels = window.APP_CONFIG.getLabels();
      var container = document.getElementById('tagList');

      if (labels.length === 0) {
        container.innerHTML = '<div class="text-muted">暂无标签，请添加</div>';
        return;
      }

      var html = '';
      labels.forEach(function(label) {
        html += '<div class="tag-item">' +
          '<span class="tag-name">' + escapeHtml(label) + '</span>' +
          '<div class="tag-actions">' +
            '<button class="tag-btn" onclick="editTag(\'' + escapeJs(label) + '\')" title="编辑">&#9999;&#65039;</button>' +
            '<button class="tag-btn delete" onclick="deleteTag(\'' + escapeJs(label) + '\')" title="删除">&#128465;&#65039;</button>' +
          '</div>' +
        '</div>';
      });
      container.innerHTML = html;
    }

    function addTag() {
      var input = document.getElementById('newTagInput');
      var name = input.value.trim();
      if (!name) {
        showToast('请输入标签名称', true);
        return;
      }
      var result = window.APP_CONFIG.addLabel(name);
      if (result.success) {
        input.value = '';
        renderTags();
        showToast(result.message);
      } else {
        showToast(result.message, true);
      }
    }

    function editTag(oldName) {
      var newName = prompt('请输入新的标签名称：', oldName);
      if (newName === null) return;
      var trimmedName = newName.trim();
      if (!trimmedName) {
        showToast('标签名称不能为空', true);
        return;
      }
      if (trimmedName === oldName) return;
      var result = window.APP_CONFIG.updateLabel(oldName, trimmedName);
      if (result.success) {
        renderTags();
        showToast(result.message);
      } else {
        showToast(result.message, true);
      }
    }

    function deleteTag(name) {
      if (!confirm('确认删除此标签？删除后标注员将无法选择此备注。')) {
        return;
      }
      var result = window.APP_CONFIG.removeLabel(name);
      if (result.success) {
        renderTags();
        showToast(result.message);
      } else {
        showToast(result.message, true);
      }
    }

    function resetToDefault() {
      if (!confirm('确定要重置为默认标签吗？')) {
        return;
      }
      var result = window.APP_CONFIG.resetLabels();
      renderTags();
      showToast(result.message);
    }

    function showToast(message, isError) {
      var toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast' + (isError ? ' error' : '') + ' show';
      setTimeout(function() {
        toast.classList.remove('show');
      }, 3000);
    }

    function escapeHtml(text) {
      if (!text) return '';
      var div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function escapeJs(str) {
      return str.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"');
    }

    // 回车添加标签
    document.getElementById('newTagInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        addTag();
      }
    });

    // 初始化
    renderTags();
  </script>
</body>
</html>
